<!DOCTYPE html>
<html lang="ru" class="__ui-theme_enabled __ui-theme_light __font-roboto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Фотомарафон — публикация</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="index.css">
<!-- В head синхронно: listener pagereveal должен зарегистрироваться до события -->
<script src="components/screen-transition.js"></script>
<style>
  * { -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--dynamic-surface-base-secondary);
  }
  .phone-frame { background: var(--dynamic-surface-base-secondary); }
  .meshok-up .status-bar,
  .meshok-up .nav-bar {
    background-color: var(--dynamic-surface-base-secondary) !important;
  }

  /* Заголовок навбара по центру (back слева, ⚙ справа). */
  .ll-fp-nav { position: relative; }
  .ll-fp-nav__title {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    color: var(--dynamic-text-and-icons-base-primary);
    pointer-events: none;
  }

  /* ── Тело формы ── */
  .ll-fp-body {
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
    padding: 0 var(--space-4) var(--space-4);
  }

  /* Зона загрузки фото (это <label> — тап открывает выбор файла).
     Пусто — кремовый фон, по центру кружок + подсказка. С фото (.__filled) —
     само фото. Чип-хэштег — оверлей в нижней-центральной части в ОБОИХ
     состояниях (позиция не меняется при прикреплении). */
  .ll-fp-drop {
    position: relative;
    display: block;
    height: 360px;
    width: 100%;
    box-sizing: border-box;
    border-radius: 20px;
    overflow: hidden;
    background: var(--static-surface-status-contrast-accent);
    cursor: pointer;
  }
  .ll-fp-drop__empty {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: var(--space-3);
    padding: var(--space-4) var(--space-4) 72px;
    text-align: center;
  }
  /* Аватар-иконка загрузки (DS avatar __type-icon), иконка внутри оранжевая. */
  /* DS-аватар __type-icon: свой фон + оранжевая иконка (через --avatar-color) */
  .ll-fp-drop__upload { background: var(--dynamic-surface-base-secondary); --avatar-color: var(--dynamic-text-and-icons-status-accent); }
  .ll-fp-drop__upload img { width: 20px; height: 20px; object-fit: contain; }   /* иконка 20×20, не растягивать */
  .ll-fp-drop__hint {
    max-width: 240px;
    color: var(--dynamic-text-and-icons-base-primary);
  }
  .ll-fp-drop__photo { display: none; }
  .ll-fp-drop__photo img { display: block; width: 100%; height: 100%; object-fit: cover; }

  .ll-fp-drop.__filled { background: var(--dynamic-surface-contrast-low); }
  .ll-fp-drop.__filled .ll-fp-drop__empty { display: none; }
  .ll-fp-drop.__filled .ll-fp-drop__photo {
    display: block;
    position: absolute;
    inset: 0;
  }

  /* Чип хэштега — фиксированный оверлей низ-центр (16 от низа), виден всегда.
     Текст ds-body-l оранжевый, паддинги 8/12. */
  .ll-fp-chip {
    position: absolute;
    left: 50%;
    bottom: 16px;
    transform: translateX(-50%);
    z-index: 1;
    display: inline-flex;
    align-items: center;
    padding: var(--space-2) var(--space-3);
    border-radius: 999px;
    background: var(--dynamic-surface-base-secondary);
    color: var(--dynamic-text-and-icons-status-accent);
    white-space: nowrap;
  }

  /* Поле подписи */
  .ll-fp-caption {
    width: 100%;
    box-sizing: border-box;
    border: 0;
    outline: none;
    background: transparent;
    padding: var(--space-2) var(--space-1);
    font-family: var(--font-family);
    font-size: 17px;      /* ds-body-l */
    line-height: 24px;
    color: var(--dynamic-text-and-icons-base-primary);
    text-align: center;
  }
  .ll-fp-caption::placeholder { color: var(--dynamic-text-and-icons-base-secondary); }

  /* ── Нижняя панель кнопок ── абсолютно прибита к низу экрана:
     «Опубликовать» на 16px от низа, горизонтальные паддинги 16px. */
  .ll-fp-actions {
    position: absolute;
    left: var(--space-4);
    right: var(--space-4);
    bottom: var(--space-4);
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    background: var(--dynamic-surface-base-secondary);
  }
  /* Резерв снизу в теле формы, чтобы контент не уезжал под кнопки. */
  .ll-fp-body { padding-bottom: 160px; }
  .ll-fp-publish[disabled] { opacity: 0.4; pointer-events: none; }
</style>
</head>
<body>

  <div class="phone-frame __fullscreen" data-screen>
    <div class="phone-frame__feed">

      <!-- STATUS + NAVBAR — DS meshok-up -->
      <div class="meshok-up">
        <div class="status-bar">
          <span class="status-bar__time">9:41</span>
          <span class="status-bar__indicators">
            <img class="ll-icon" src="assets/icons/status-wifi.svg"    width="16" height="12" alt="">
            <img class="ll-icon" src="assets/icons/status-signal.svg"  width="17" height="12" alt="">
            <img class="ll-icon" src="assets/icons/status-battery.svg" width="25" height="12" alt="">
          </span>
        </div>

        <div class="nav-bar __type-feed ll-fp-nav">
          <div class="nav-bar__leading">
            <span class="button-inline-wrapper __size-24 __view-secondary"><button class="button-inline __size-24 nav-bar__back" data-action="back" data-back-fallback="marathon.html" aria-label="Назад"><span class="button-inline__content"><span class="icon __size-24 __slot-back"></span></span></button></span>
          </div>
          <span class="ll-fp-nav__title ds-title-l">Фотомарафон</span>
          <div class="nav-bar__trailing">
            <span class="button-inline-wrapper __size-24 __view-secondary"><button class="button-inline __size-24" aria-label="Настройки"><span class="button-inline__content"><img class="ll-icon button-inline__icon" src="assets/icons/settings_24.svg" width="24" height="24" alt=""></span></button></span>
          </div>
        </div>
      </div>

      <!-- ТЕЛО ФОРМЫ -->
      <div class="ll-fp-body">
        <label class="ll-fp-drop" id="fpDrop" aria-label="Загрузить фото">
          <input type="file" id="fpFile" accept="image/*" hidden>
          <div class="ll-fp-drop__empty">
            <div class="avatar __size-56 __type-icon ll-fp-drop__upload"><img class="ll-fp-drop__upload-icon" src="assets/icons/photo_add_24_orange.svg" width="20" height="20" alt=""></div>
            <div class="ll-fp-drop__hint ds-title-m">Загрузите хотя бы одно фото для участия</div>
          </div>
          <div class="ll-fp-drop__photo">
            <img id="fpPhoto" src="" alt="">
          </div>
          <span class="ll-fp-chip ds-body-l" id="fpChip">#РадостьДетства</span>
        </label>

        <input class="ll-fp-caption" id="fpCaption" type="text" placeholder="Подпись к фото">
      </div>

      <!-- НИЖНИЕ КНОПКИ -->
      <div class="ll-fp-actions">
        <div class="button-wrapper __size-56 __full-width" style="display:block; width:100%" id="fpMore">
          <button class="button-container __style-secondary" style="width:100%" data-href="marathon.html"><span class="button-content">Подробнее о фотомарафоне</span></button>
        </div>
        <div class="button-wrapper __size-56 __full-width" style="display:block; width:100%">
          <button class="button-container __style-primary ll-fp-publish" style="width:100%" id="fpPublish" disabled><span class="button-content">Опубликовать</span></button>
        </div>
      </div>

    </div>
  </div>

  <script src="components/back-button.js"></script>
  <script>
    (function () {
      var fileInput = document.getElementById('fpFile');
      var drop      = document.getElementById('fpDrop');
      var photoImg  = document.getElementById('fpPhoto');
      var chip      = document.getElementById('fpChip');
      var caption   = document.getElementById('fpCaption');
      var publish   = document.getElementById('fpPublish');
      var more      = document.getElementById('fpMore');
      var HASHTAG   = '#РадостьДетства';
      var photoData = '';

      // Тема марафона — из data/marathon.json (meta.hashtag).
      fetch('data/marathon.json').then(function (r) { return r.json(); }).then(function (d) {
        if (d && d.meta && d.meta.hashtag) { HASHTAG = d.meta.hashtag; chip.textContent = HASHTAG; }
      }).catch(function () {});

      // Каждая публикация — с чистой подписью (не подтягиваем предыдущую).

      // Выбор реального фото → уменьшаем (canvas) и показываем в зоне.
      fileInput.addEventListener('change', function () {
        var f = fileInput.files && fileInput.files[0];
        if (!f) return;
        var rd = new FileReader();
        rd.onload = function () {
          var im = new Image();
          im.onload = function () {
            var max = 1000, w = im.width, h = im.height;
            if (Math.max(w, h) > max) { var s = max / Math.max(w, h); w = Math.round(w * s); h = Math.round(h * s); }
            var cv = document.createElement('canvas'); cv.width = w; cv.height = h;
            cv.getContext('2d').drawImage(im, 0, 0, w, h);
            try { photoData = cv.toDataURL('image/jpeg', 0.85); } catch (e) { photoData = rd.result; }
            photoImg.src = photoData;
            drop.classList.add('__filled');
            publish.disabled = false;
            if (more) more.style.display = 'none';
          };
          im.src = rd.result;
        };
        rd.readAsDataURL(f);
      });

      // «Опубликовать» → кладём фото/подпись/хэштег в кеш и открываем ЛЕНТУ
      // (шторка и пост пользователя появятся уже там).
      publish.addEventListener('click', function () {
        if (publish.disabled) return;
        try {
          // Добавляем пост в список опубликованных (прежние не затираем).
          var arr = [];
          try { arr = JSON.parse(sessionStorage.getItem('mp_published') || '[]'); } catch (e) { arr = []; }
          if (!Array.isArray(arr)) arr = arr ? [arr] : [];
          arr.push({ photo: photoData, caption: caption.value || '', hashtag: HASHTAG });
          sessionStorage.setItem('mp_published', JSON.stringify(arr));
          sessionStorage.setItem('mp_show_sheet', '1');
        } catch (e) {}
        location.href = 'lenta-q3.html?published=1';
      });
    })();

    // Делегированный переход по data-href (кнопка «Подробнее о фотомарафоне»).
    document.addEventListener('click', function (e) {
      var btn = e.target.closest && e.target.closest('[data-href]');
      if (!btn) return;
      e.preventDefault();
      location.href = btn.getAttribute('data-href');
    });
  </script>
</body>
</html>
