# docker-compose для VM (Yandex Compute Cloud).
#
# На VM лежит копия репозитория в /opt/proto-moon; SourceCraft CI на каждый
# push в main заливает свежий код и делает `docker compose up -d --build`.
# Сервис — тот же server.mjs: раздаёт статику + синкает ленту из Google-таблицы
# (живая кнопка «Обновить ленту» работает, т.к. VM всегда включена).
services:
  web:
    build: .
    restart: always
    ports:
      - "80:8080"          # наружу 80 → внутри контейнера PORT=8080
    environment:
      - PORT=8080
      - SYNC_ON_START=true # синкать ленту при старте, как было на Railway
      # Кнопка-синк коммитит результат и пушит. Значения берутся из окружения VM
      # или из /opt/proto-moon/.env (НЕ коммить .env с токеном!). Без токена/URL
      # коммит сделается, но пуш не пройдёт. Подробно — в YANDEX-CLOUD.md.
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}              # для пуша на GitHub
      - SYNC_GIT_PUSH_URL=${SYNC_GIT_PUSH_URL:-}    # или готовый remote (Sourcecraft) — приоритетнее
      - SYNC_GIT_BRANCH=${SYNC_GIT_BRANCH:-main}
      - SYNC_GIT_NAME=${SYNC_GIT_NAME:-proto-moon sync}
      - SYNC_GIT_EMAIL=${SYNC_GIT_EMAIL:-sync@proto-moon.local}
      - SYNC_GIT_COMMIT=${SYNC_GIT_COMMIT:-true}    # false — выключить авто-коммит
