<!DOCTYPE html>
<html lang="ru" class="__ui-theme_enabled __ui-theme_light __font-roboto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Подарки — каталог</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="index.css">
<!-- В head синхронно: listener pagereveal должен зарегистрироваться до события -->
<script src="components/screen-transition.js"></script>
<style>
  * { -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0; padding: 0; height: 100%;
    /* primary = тёплый серый — на нём «остров» (.island, secondary=#fff)
       видно как контрастный блок. */
    background: var(--dynamic-surface-base-primary);
  }
  .phone-frame { background: var(--dynamic-surface-base-primary); }

  /* meshok-up (status + nav + tabs) сохраняет белый фон через DS-токены,
     прибавляем secondary к самой шапке, чтобы под табами стык был ровный. */
  .meshok-up .status-bar,
  .meshok-up .nav-bar {
    background-color: var(--dynamic-surface-base-secondary) !important;
  }

  /* Вкладки (DS TabsView base) — отступы как в других экранах */
  .ll-gc-tabs {
    --tabs-view-padding-left: var(--space-4);
    --tabs-view-padding-right: var(--space-4);
    --tabs-view-padding-top: var(--space-1);
    background-color: var(--dynamic-surface-base-secondary);
  }
  .ll-gc-tabs .tabs-row { background-color: var(--dynamic-surface-base-secondary); }

  /* Островная обёртка вокруг хедера и грида — без верхнего/нижнего паддинга
     острова (грид сам управляет внутренними отступами 12/36).
     flex-shrink: 0 — иначе flex-column родитель (.phone-frame__feed) сжимает
     остров и скролл ломается. */
  .ll-gc-island {
    flex-shrink: 0;
    margin: var(--space-2) 0 0;
    /* Все элементы острова (получатель / заголовок / сетка) с гэпом 12. */
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
    padding: var(--space-3) 0 36px;
    background-color: var(--dynamic-surface-base-secondary);
    overflow: visible;
  }

  /* Хедер «День рождения!» — DS header __size-l. Вертикальные отступы задаёт
     gap острова, поэтому здесь только горизонтальные 16. */
  .ll-gc-section-head {
    padding: 0 var(--space-4);
  }

  /* Получатель (приход с годовщины: ?to=<id>): аватар + ФИ + разделитель снизу
     (с гор. паддингами 16, через ::after). Показывается через .__on (JS). */
  .ll-gc-recipient {
    display: none;
    position: relative;
    align-items: center;
    gap: var(--space-2);
    padding: 0 var(--space-4) var(--space-3);
  }
  .ll-gc-recipient.__on { display: flex; }
  .ll-gc-recipient::after {
    content: '';
    position: absolute;
    left: var(--space-4);
    right: var(--space-4);
    bottom: 0;
    height: 1px;
    background: var(--dynamic-stroke-contrast-low);
  }
  .ll-gc-recipient__name { color: var(--dynamic-text-and-icons-base-primary); }

  /* Сетка подарков — 2×N, gap 12, бока 16 (низ острова даёт padding-bottom). */
  .ll-gc-grid {
    display: grid;
    /* 2×N — две колонки. minmax(0,1fr) гасит min-content-расширение от
       крупного font-size в постере. */
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: var(--space-3);                          /* 12px */
    padding: 0 var(--space-4);
  }

  /* Сама карточка — вертикальный стек: image squircle + price-tag под ним.
     Тег прижат к левому краю с лёгким отступом сверху (4px). */
  .ll-gift {
    display: flex;
    flex-direction: column;
    align-items: center;                          /* ценник по центру под карточкой */
    gap: var(--space-1);                          /* 4px между картинкой и тегом */
    min-width: 0;                                 /* не давать постеру растягивать колонку */
    background: none;
    border: 0;
    padding: 0;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    color: inherit;
    transition: transform 200ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .ll-gift:active { transform: scale(0.97); }

  /* Squircle-постер: real-image открытка. Заполняет квадрат, object-fit: cover. */
  .ll-gift__poster {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 20px;
    overflow: hidden;
    background: var(--dynamic-surface-contrast-low);
    display: block;
    user-select: none;
  }
  .ll-gift__poster img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
</style>
</head>
<body>

  <div class="phone-frame __fullscreen" data-screen>
    <div class="phone-frame__feed">

      <!-- STATUS + NAVBAR — DS meshok-up -->
      <div class="meshok-up">
        <div class="status-bar">
          <span class="status-bar__time">9:41</span>
          <span class="status-bar__indicators">
            <img class="ll-icon" src="assets/icons/status-wifi.svg"    width="16" height="12" alt="">
            <img class="ll-icon" src="assets/icons/status-signal.svg"  width="17" height="12" alt="">
            <img class="ll-icon" src="assets/icons/status-battery.svg" width="25" height="12" alt="">
          </span>
        </div>

        <div class="nav-bar __type-feed">
          <div class="nav-bar__leading">
            <span class="button-inline-wrapper __size-24 __view-secondary"><button class="button-inline __size-24 nav-bar__back" aria-label="Назад"><span class="button-inline__content"><span class="icon __size-24 __slot-back"></span></span></button></span>
            <span class="ds-title-l">Подарки</span>
          </div>
          <div class="nav-bar__trailing">
            <span class="button-inline-wrapper __size-24 __view-secondary"><button class="button-inline __size-24" aria-label="Поиск"><span class="button-inline__content"><img class="ll-icon button-inline__icon" src="assets/icons/search_24.svg" width="24" height="24" alt=""></span></button></span>
            <span class="button-inline-wrapper __size-24 __view-secondary"><button class="button-inline __size-24" aria-label="Закладки"><span class="button-inline__content"><img class="ll-icon button-inline__icon" src="assets/icons/bookmark_24.svg" width="24" height="24" alt=""></span></button></span>
            <span class="button-inline-wrapper __size-24 __view-secondary"><button class="button-inline __size-24" aria-label="Ещё"><span class="button-inline__content"><img class="ll-icon button-inline__icon" src="assets/icons/more_vertical_24.svg" width="24" height="24" alt=""></span></button></span>
          </div>
        </div>
      </div>

      <!-- ВКЛАДКИ (DS Tab, base) — Популярное / Категории / Мои подарки -->
      <div class="tabs-view __with-divider ll-gc-tabs">
        <div class="tabs-row __scroll">
          <button class="tab-wrapper __view-base __selected" role="tab" aria-selected="true">
            <span class="inner-wrapper"><span class="tab"><span class="content"><span class="label ds-title-s">Популярное</span></span></span></span>
            <span class="line"></span>
          </button>
          <button class="tab-wrapper __view-base" role="tab" aria-selected="false">
            <span class="inner-wrapper"><span class="tab"><span class="content"><span class="label ds-title-s">Категории</span></span></span></span>
            <span class="line"></span>
          </button>
          <button class="tab-wrapper __view-base" role="tab" aria-selected="false">
            <span class="inner-wrapper"><span class="tab"><span class="content"><span class="label ds-title-s">Мои подарки</span></span></span></span>
            <span class="line"></span>
          </button>
        </div>
      </div>

      <!-- ИСЛАНД: (опц.) получатель с годовщины + хедер + сетка подарков -->
      <section class="ll-gc-island">
        <!-- Получатель (аватар + ФИ + разделитель). Заполняется из ?to=<id>. -->
        <div class="ll-gc-recipient" id="gcRecipient">
          <div class="avatar __size-36 __type-image"><img id="gcRecipientAva" src="" alt=""></div>
          <span class="ds-title-s ll-gc-recipient__name" id="gcRecipientName"></span>
        </div>
        <header class="header __size-l ll-gc-section-head">
          <div class="header__title ds-title-l">День рождения!</div>
        </header>

        <!-- Сетка подарков собирается из data/gifts.js (window.DS_GIFTS_DATA). -->
        <div class="ll-gc-grid" id="gcGrid"></div>
      </section>

    </div>

    <!-- TABBAR -->
    <div class="ll-tabbar">
      <div class="tabbar __platform-ios">
        <div class="tabbar__row">
          <button class="tabbar-icon __slot-feed" aria-label="Лента"></button>
          <button class="tabbar-icon __slot-book" aria-label="Книга"></button>
          <button class="tabbar-icon __slot-message" aria-label="Сообщения"></button>
          <button class="tabbar-icon __slot-clip" aria-label="Клипы"></button>
          <button class="tabbar-icon __slot-menu __state-on" aria-label="Меню"></button>
        </div>
        <div class="tabbar__handle"></div>
      </div>
    </div>
  </div>

  <script src="components/back-button.js"></script>
  <script src="components/tab.js"></script>
  <script src="components/tab-bar.js"></script>

  <!-- Каталог подарков (картинки/цены) -->
  <script src="data/gifts.js"></script>
  <script>
    // Сетка подарков из data/gifts.js (наборы по типу из листа «Подарки»):
    //   ?to=<id>  → набор friendversary (приход с годовщины);
    //   иначе     → набор basic (базовая страница).
    (function () {
      var grid = document.getElementById('gcGrid');
      var data = window.DS_GIFTS_DATA || {};
      var set = new URLSearchParams(location.search).get('to') ? 'friendversary' : 'basic';
      var list = data[set] || data.basic || [];
      if (!grid || !list.length) return;
      grid.innerHTML = list.map(function (g) {
        return '<a class="ll-gift" href="send-gift.html?gift=' + encodeURIComponent(g.id) + '">' +
          '<span class="ll-gift__poster"><img src="' + (g.image || '') + '" alt="" loading="lazy"></span>' +
          '<span class="price-tag">' + (g.price || '0 ОК') + '</span>' +
        '</a>';
      }).join('');
    })();
  </script>

  <!-- Реальные люди (для получателя с годовщины) -->
  <script src="data/people.js"></script>
  <script src="components/people-data.js"></script>
  <script>
    // Приход с годовщины дружбы: ?to=<id людей>&anniv=<лет>. Показываем ряд
    // «аватар + ФИ + разделитель» и меняем заголовок раздела на «N года дружбы».
    (function () {
      var params = new URLSearchParams(location.search);
      var to = params.get('to');
      if (!to) return;
      var anniv = params.get('anniv');
      function plural(n, forms) {
        n = Math.abs(n) % 100;
        var n1 = n % 10;
        if (n > 10 && n < 20) return forms[2];
        if (n1 > 1 && n1 < 5) return forms[1];
        if (n1 === 1) return forms[0];
        return forms[2];
      }
      function apply() {
        var p = (window.DS_PEOPLE && window.DS_PEOPLE.get(to)) || null;
        var row = document.getElementById('gcRecipient');
        if (p && row) {
          var ava = document.getElementById('gcRecipientAva');
          var name = document.getElementById('gcRecipientName');
          if (ava) { ava.src = p.photo || ''; ava.alt = p.name || ''; }
          if (name) name.textContent = p.name || '';
          row.classList.add('__on');
        }
        if (anniv) {
          var head = document.querySelector('.ll-gc-section-head .header__title');
          if (head) head.textContent = anniv + ' ' + plural(+anniv, ['год', 'года', 'лет']) + ' дружбы';
        }
      }
      if (window.DS_PEOPLE) apply();
      else document.addEventListener('DOMContentLoaded', apply);
    })();
  </script>
</body>
</html>
