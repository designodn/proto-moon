<!DOCTYPE html>
<html lang="ru" class="__ui-theme_enabled __ui-theme_dark __font-roboto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>UGC Клип Предпросмотр — прототип</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600&display=swap">
<link rel="stylesheet" href="index.css">
<!-- В head синхронно: listener pagereveal должен зарегистрироваться до события -->
<script src="components/screen-transition.js"></script>
<style>
  * { -webkit-tap-highlight-color: transparent; }

  /* Тёмный полноэкранный редактор клипа. Фон — чёрный, чтобы превью-кадр
     «выезжал» островом по центру, как в эталоне «UGC Клип Предпросмотр». */
  html, body { margin: 0; padding: 0; height: 100%; background: #000; }
  .phone-frame { background: #000; }
  .phone-frame__feed {
    padding-top: env(safe-area-inset-top, 0px);
    display: flex;
    flex-direction: column;
    height: 100%;
    box-sizing: border-box;
  }

  /* Системные иконки статус-бара на чёрном — белым. */
  .status-bar { color: #fff; }
  .status-bar img { filter: brightness(0) invert(1); }

  /* Верхняя панель: ✕ слева, «Редактировать» справа.
     Абсолют, прижата к верху экрана, поверх превью — как шапка сторизов. */
  .ce-top {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 3;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--space-4);
  }
  /* Градиент-подложка под шапкой — как в сторизах: тёмный сверху, плавно в ноль.
     Живёт внутри превью под заголовком (z-index 1 < .ce-title z-index 2), чтобы
     подпись была НАД градиентом. Кнопки шапки (.ce-top, z-index 3) всё равно
     рисуются поверх затемнения — читаемость сохраняется. */
  .ce-preview::before {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    top: 0;
    height: 160px;
    z-index: 1;
    background: linear-gradient(to bottom, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0));
    pointer-events: none;
  }
  /* «Редактировать» — DS-кнопка (__style-secondary-on-color). Локально только
     не даём ей растягиваться. */
  .ce-edit { flex: 0 0 auto; }

  /* Превью-кадр клипа: full-bleed на всю площадь под шапкой; скругление только
     снизу (сверху flush, низ — 32). */
  .ce-stage {
    flex: 1 1 auto;
    min-height: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    border-radius: 0 0 32px 32px;
    overflow: hidden;
  }
  .ce-preview {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #111;
  }
  .ce-preview > img {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover; display: block;
    will-change: transform, filter;
  }
  /* Эффекты перехода кадр→кадр (Ken Burns) при проигрывании — по кругу. */
  @keyframes ce-zoom-in  { from { transform: scale(1);    } to { transform: scale(1.12); } }
  @keyframes ce-zoom-out { from { transform: scale(1.12); } to { transform: scale(1);    } }
  @keyframes ce-pan-left { from { transform: scale(1.12) translateX(4%); } to { transform: scale(1.12) translateX(-4%); } }
  @keyframes ce-blur-in  { 0% { filter: blur(14px); transform: scale(1.08); } 60% { filter: blur(0); } 100% { filter: blur(0); transform: scale(1.08); } }
  .ce-preview > img.__fx-zoom-in  { animation: ce-zoom-in  1.4s ease-out both; }
  .ce-preview > img.__fx-zoom-out { animation: ce-zoom-out 1.4s ease-out both; }
  .ce-preview > img.__fx-pan-left { animation: ce-pan-left 1.4s ease-out both; }
  .ce-preview > img.__fx-blur-in  { animation: ce-blur-in 1.2s ease-out both; }
  @media (prefers-reduced-motion: reduce) {
    .ce-preview > img { animation: none !important; }
  }
  /* Подпись-период сверху по центру. */
  .ce-title {
    position: absolute;
    top: 64px;
    left: 0; right: 0;
    z-index: 2;
    text-align: center;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
    pointer-events: none;
    /* Форсируем брендовый OK Sans Display (страница на Roboto). */
    font-family: "OK Sans Display", sans-serif;
  }
  /* Кнопка play по центру кадра. */
  .ce-play {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
    width: 56px; height: 56px;
    display: flex; align-items: center; justify-content: center;
    border: 0; padding: 0; border-radius: 50%;
    background: rgba(0, 0, 0, 0.4);
    cursor: pointer;
  }
  .ce-play img { filter: brightness(0) invert(1); }

  /* Раскадровка снизу превью: лента превьюшек + белый плейхед слева.
     Лёгкий градиент снизу для читаемости миниатюр. */
  .ce-strip-grad {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 120px;
    z-index: 1;
    background: linear-gradient(to top, rgba(0,0,0,0.45), transparent);
    pointer-events: none;
  }
  .ce-strip {
    position: absolute;
    bottom: var(--space-4);
    left: 50%;
    transform: translateX(-50%);   /* раскадровка по центру контейнера */
    z-index: 2;
    height: 40px;
  }
  /* Кадры — квадраты 40×40 в ряд. */
  .ce-strip__frames { display: flex; gap: 4px; height: 100%; }
  .ce-strip__frame {
    flex: 0 0 40px;
    width: 40px; height: 40px;
    border-radius: 6px;
    overflow: hidden;
    background: #222;
  }
  .ce-strip__frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
  /* Плейхед — тонкая белая вертикаль; во время проигрывания едет по таймлайну
     (left анимирует JS на длительность клипа). */
  .ce-playhead {
    position: absolute;
    top: -8px; left: 0;
    z-index: 3;
    width: 2px;
    height: 56px;
    background: #fff;
    border-radius: 2px;
    box-shadow: 0 0 4px rgba(0, 0, 0, 0.4);
  }

  /* Нижний CTA «Создать клип» — оранжевый primary во всю ширину, высота 36 (DS). */
  .ce-cta {
    padding: var(--space-3) var(--space-4) calc(var(--space-3) + env(safe-area-inset-bottom, 0px));
  }
</style>
</head>
<body>

  <div class="phone-frame __fullscreen" data-screen>
    <div class="phone-frame__feed">

      <div class="status-bar">
        <span class="status-bar__time">9:41</span>
        <span class="status-bar__indicators">
          <img class="ll-icon" src="assets/icons/status-wifi.svg"    width="16" height="12" alt="">
          <img class="ll-icon" src="assets/icons/status-signal.svg"  width="17" height="12" alt="">
          <img class="ll-icon" src="assets/icons/status-battery.svg" width="25" height="12" alt="">
        </span>
      </div>

      <!-- Верхняя панель -->
      <div class="ce-top">
        <span class="button-inline-wrapper __size-24 __view-primary-on-color ce-close">
          <button class="button-inline __size-24" id="ceClose" aria-label="Закрыть"><span class="button-inline__content"><span class="button-inline__icon icon __size-24 __slot-close"></span></span></button>
        </span>
        <div class="button-wrapper __size-36 ce-edit">
          <button class="button-container __style-secondary-on-color" id="ceEdit"><span class="button-content">Редактировать</span></button>
        </div>
      </div>

      <!-- Превью клипа -->
      <div class="ce-stage">
        <div class="ce-preview" id="cePreview">
          <img id="ceHero" src="" alt="">
          <div class="ce-title ds-title-xl" id="ceTitle">Лето 2026</div>
          <button class="ce-play" id="cePlay" aria-label="Воспроизвести">
            <img src="assets/icons/play_filled_24.svg" width="28" height="28" alt="">
          </button>
          <div class="ce-strip-grad"></div>
          <div class="ce-strip">
            <div class="ce-strip__frames" id="ceStrip"></div>
            <div class="ce-playhead" id="cePlayhead"></div>
          </div>
        </div>
      </div>

      <!-- Нижний CTA → проваливаемся в полноэкранный плеер клипов (klipy.html) -->
      <div class="ce-cta">
        <div class="button-wrapper __size-36 __full-width">
          <button class="button-container __style-primary" id="ceCreate"><span class="button-content">Создать клип</span></button>
        </div>
      </div>

    </div>
  </div>

  <script>
    // Данные клипа прокидывает lenta-q3.html через sessionStorage('clipEdit')
    // = { label, photos: [...] }. Фолбэк — дефолтная летняя подборка.
    (function () {
      var data = null;
      try { data = JSON.parse(sessionStorage.getItem('clipEdit') || 'null'); } catch (_) {}
      var photos = (data && data.photos && data.photos.length) ? data.photos : [
        'https://avatars.dzeninfra.ru/get-zen_doc/271828/pub_67beb36e89ba58323c122836_67bf621e4c2ad61145bc261a/scale_1200'
      ];
      var label = (data && data.label) || 'Лето 2026';

      document.getElementById('ceTitle').textContent = label;
      var hero = document.getElementById('ceHero');

      // Эффекты перехода кадр→кадр (Ken Burns), по кругу. Снимаем класс,
      // форсим reflow и ставим новый — так анимация перезапускается на кадре.
      var HERO_FX = ['__fx-zoom-in', '__fx-zoom-out', '__fx-pan-left', '__fx-blur-in'];
      function showFrame(n) {
        hero.src = photos[n];
        HERO_FX.forEach(function (c) { hero.classList.remove(c); });
        void hero.offsetWidth;
        hero.classList.add(HERO_FX[n % HERO_FX.length]);
      }
      showFrame(0);

      // Раскадровка — миниатюры из тех же кадров.
      var strip = document.getElementById('ceStrip');
      strip.innerHTML = photos.map(function (u) {
        return '<div class="ce-strip__frame"><img src="' + u + '" alt=""></div>';
      }).join('');

      // Воспроизведение: прокрутка кадров + плейхед по таймлайну.
      // Тап в любую область клипа — пауза/продолжение (toggle).
      var FRAME_MS = 1200;
      var TOTAL = photos.length * FRAME_MS;
      var i = 0, timer = null, playing = false;
      var preview = document.getElementById('cePreview');
      var play = document.getElementById('cePlay');
      var playhead = document.getElementById('cePlayhead');

      function stripWidth() {
        var r = strip.getBoundingClientRect();
        return r.width || 1;
      }
      function headLeftPx() {
        return parseFloat(getComputedStyle(playhead).left) || 0;
      }
      function setPlayIcon() { play.style.opacity = playing ? '0' : ''; }

      function start() {
        if (i >= photos.length) { i = 0; }   // доиграли → старт сначала
        playing = true; setPlayIcon();
        showFrame(i);
        // Плейхед продолжает с текущей позиции до конца за оставшееся время.
        var frac = headLeftPx() / stripWidth();
        if (frac >= 1 || frac < 0) frac = 0;
        var remaining = TOTAL * (1 - frac);
        playhead.style.transition = 'none';
        void playhead.offsetWidth;            // reflow, чтобы зафиксировать старт
        requestAnimationFrame(function () {
          playhead.style.transition = 'left ' + remaining + 'ms linear';
          playhead.style.left = 'calc(100% - 2px)';
        });
        timer = setInterval(function () {
          i += 1;
          if (i >= photos.length) { finish(); return; }
          showFrame(i);
        }, FRAME_MS);
      }
      function pause() {
        playing = false; setPlayIcon();
        if (timer) { clearInterval(timer); timer = null; }
        var cur = getComputedStyle(playhead).left;   // замораживаем плейхед
        playhead.style.transition = 'none';
        playhead.style.left = cur;
      }
      function finish() {
        if (timer) { clearInterval(timer); timer = null; }
        playing = false; setPlayIcon();
        playhead.style.transition = 'none';
        playhead.style.left = '0px';
        i = 0;                                 // готов к повтору сначала
      }

      // Тап в любую область превью клипа — старт/пауза.
      preview.addEventListener('click', function () {
        playing ? pause() : start();
      });
    })();
  </script>

  <!-- ✕ и системный back возвращают в ленту -->
  <script>
    document.getElementById('ceClose').addEventListener('click', function () {
      location.href = 'lenta-q3.html';
    });
    // «Создать клип» → проваливаемся в полноэкранный плеер клипов (леер #208).
    // Первый слайд плеера = ЭТОТ же клип: те же кадры + подпись, автор —
    // текущий пользователь, а лайки/комменты/репосты по нулям (только что создан).
    // Просим плеер вернуть «Назад» в ленту Q3 (одноразовый ключ).
    document.getElementById('ceCreate').addEventListener('click', function () {
      var d = null;
      try { d = JSON.parse(sessionStorage.getItem('clipEdit') || 'null'); } catch (_) {}
      var newClip = {
        photos: (d && d.photos && d.photos.length) ? d.photos : [],
        label: (d && d.label) || 'Лето 2026',
        name: 'Анфиса Тимирбаева (Абдуллина)',
        ava: 'https://vki9.okcdn.ru/i?r=CFtAm_VFBkioSGBqh1IfQABrMs5JMZBFDExjXZ75V-rTcAntoP0RQWBJ6IbgpEazbwqhn0_FHCJwVQxlfni_XZmVQQTBH6yJi_fqqsj7meaamsPXbBT20IJ3RHYAAAAp&dpr=2'
      };
      try {
        sessionStorage.setItem('klipyBack', 'lenta-q3.html');
        sessionStorage.setItem('newClip', JSON.stringify(newClip));
        sessionStorage.setItem('newClipCelebrate', '1');   // одноразовое конфетти на klipy
      } catch (_) {}
      location.href = 'klipy.html';
    });
  </script>
  <script src="components/back-trap.js" data-target="lenta-q3.html"></script>
  <script src="components/smart-crop.js" defer></script>
</body>
</html>
