# SourceCraft CI/CD — автодеплой прототипа на Yandex Compute Cloud по SSH.
#
# Поток: push в main на GitHub → GitHub Action зеркалит репо в SourceCraft →
# этот пайплайн заливает свежий код на VM (/opt/proto-moon) и пересобирает
# контейнер (docker compose up -d --build). Сервис — server.mjs: чистая раздача
# статики (контент запечён в репо скриптами fetch-*; синка на сервере нет).
#
# Нужен ОДИН секрет в SourceCraft (Settings → Secrets):
#   DEPLOY_SSH_KEY — приватный SSH-ключ для входа на VM, base64
#                    (на Маке: base64 < key | pbcopy).
# Адрес сервера и пользователь не секретны — заданы ниже в env.

on:
  push:
    - workflows: [deploy]
      filter:
        branches: ["main"]

workflows:
  deploy:
    tasks:
      - name: deploy-to-yandex
        cubes:
          - name: ship
            image: docker.io/library/alpine:3.20
            env:
              DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
              DEPLOY_HOST: "89.169.132.5"   # VM ok-ds-vm (id fhm4fsj5ia9nbh9th9p6)
              DEPLOY_USER: "yc-user"
            script:
              - apk add --no-cache openssh-client tar
              - mkdir -p ~/.ssh && chmod 700 ~/.ssh
              # Ключ хранится в секрете как base64 — декодируем обратно в файл.
              - printf '%s' "$DEPLOY_SSH_KEY" | base64 -d > ~/.ssh/id_deploy
              - chmod 600 ~/.ssh/id_deploy
              # Код пакуем в ФАЙЛ (не пайп `tar | ssh`: под pipefail он молча рвётся
              # от любого warning'а локального tar, и деплой обрывается до заливки).
              - tar --exclude='./.git' --exclude='./node_modules' -C /sourcecraft/workspace -czf /tmp/code.tgz .
              # Заливаем архив на VM и распаковываем в /opt/proto-moon.
              - ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$DEPLOY_USER@$DEPLOY_HOST" "tar -C /opt/proto-moon -xzf -" < /tmp/code.tgz
              # Пересобираем и пересоздаём контейнер из свежего кода (одной простой
              # ssh-командой — без многострочных вставок с «#»/кавычками, на которых
              # спотыкается busybox-раннер).
              - ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$DEPLOY_USER@$DEPLOY_HOST" "cd /opt/proto-moon && docker compose up -d --build --force-recreate && docker image prune -f"
