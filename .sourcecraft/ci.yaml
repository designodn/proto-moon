# SourceCraft CI/CD — автодеплой прототипа на Yandex Compute Cloud по SSH.
#
# На каждый push в main: код упаковывается tar'ом, отправляется на VM по ssh
# в /opt/proto-moon и контейнер пересобирается/перезапускается
# (docker compose up -d --build). Сервис — server.mjs (раздача статики + синк
# ленты из Google-таблицы). VM всегда включена → кнопка «Обновить ленту» и
# синк при старте работают стабильно (как было на Railway).
#
# Секреты в SourceCraft (Settings → Secrets репозитория-зеркала):
#   DEPLOY_SSH_KEY            — приватный SSH-ключ для входа на VM, base64.
#                               (выдаётся отдельно; на Маке: base64 < key | pbcopy)
#   SYNC_GIT_TOKEN            — GitHub PAT с правом записи (кнопка-синк пушит в main).
#   UPLOADS_ACCESS_KEY_ID     — ключ S3-бакета загрузок (облако для медиа).
#   UPLOADS_SECRET_ACCESS_KEY — секрет S3-бакета.
#   UPLOAD_PASSWORD           — пароль на страницу загрузки /content (по желанию).
# Все, кроме DEPLOY_SSH_KEY, опциональны: не задан → соответствующая фича просто
# выключена. CI собирает из них /opt/proto-moon/.env на каждом деплое (см. ниже).
# Адрес сервера и пользователь не секретны — заданы ниже в env.

on:
  push:
    - workflows: [deploy]
      filter:
        branches: ["main"]

workflows:
  deploy:
    tasks:
      - name: deploy-to-yandex
        cubes:
          - name: ship
            image: docker.io/library/alpine:3.20
            env:
              DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
              DEPLOY_HOST: "89.169.132.5"   # VM ok-ds-vm (id fhm4fsj5ia9nbh9th9p6)
              DEPLOY_USER: "yc-user"
              # GitHub-токен (PAT с правом записи) — чтобы кнопка-синк пушила
              # результат в main. Добавь в SourceCraft → Settings → Secrets как
              # SYNC_GIT_TOKEN. Не задан → кнопка работает, но без пуша.
              SYNC_GIT_TOKEN: ${{ secrets.SYNC_GIT_TOKEN }}
              # Облако для медиа (S3 / Yandex Object Storage). Добавь в SourceCraft
              # → Settings → Secrets. Не заданы → дисковый режим (как раньше).
              # Имя бакета и публичная база не секретны — зашиты ниже литералом.
              UPLOADS_ACCESS_KEY_ID: ${{ secrets.UPLOADS_ACCESS_KEY_ID }}
              UPLOADS_SECRET_ACCESS_KEY: ${{ secrets.UPLOADS_SECRET_ACCESS_KEY }}
              UPLOAD_PASSWORD: ${{ secrets.UPLOAD_PASSWORD }}
            script:
              - apk add --no-cache openssh-client tar
              - mkdir -p ~/.ssh && chmod 700 ~/.ssh
              # Ключ хранится в секрете как base64 — декодируем обратно в файл.
              - printf '%s' "$DEPLOY_SSH_KEY" | base64 -d > ~/.ssh/id_deploy
              - chmod 600 ~/.ssh/id_deploy
              # ─── ДИАГНОСТИКА (временно) ───────────────────────────────────────
              # Деплой падал «молча» на заливке tar (ошибка уходила в stderr и не
              # попадала в лог). Печатаем полное состояние VM ДО заливки — кто я,
              # права/владелец /opt/proto-moon, docker, диск — чтобы перестать гадать.
              - |
                ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$DEPLOY_USER@$DEPLOY_HOST" '
                  echo "===== WHOAMI ====="; whoami; id
                  echo "===== DISK ====="; df -h /
                  echo "===== /opt/proto-moon (dir) ====="; ls -ld /opt/proto-moon 2>&1
                  echo "===== /opt/proto-moon (top 40) ====="; ls -la /opt/proto-moon 2>&1 | head -40
                  echo "===== OWNERS (top 40) ====="; stat -c "%U:%G %a %n" /opt/proto-moon /opt/proto-moon/* 2>/dev/null | head -40
                  echo "===== DOCKER PS ====="; docker ps -a 2>&1
                  echo "===== DOCKER DF ====="; docker system df 2>&1
                  echo "===== PRUNE ====="; docker system prune -af 2>&1 || true
                  echo "===== DISK AFTER PRUNE ====="; df -h /
                '
              # Заливаем код на VM (tar по ssh) в /opt/proto-moon.
              # ДИАГНОСТИКА: stderr и КОД ВОЗВРАТА tar пишем в файл и печатаем —
              # раньше ошибка tar уходила в stderr и не была видна, отчего «лог
              # обрывался без причины». В конце echo → шаг exit 0 и НЕ прерывает ран,
              # чтобы за один прогон увидеть ещё и сборку (читаем ЛОГ, не статус).
              - |
                tar --exclude='./node_modules' -C /sourcecraft/workspace -czf - . \
                  | ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$DEPLOY_USER@$DEPLOY_HOST" '
                      echo "===== TAR EXTRACT ====="
                      tar -C /opt/proto-moon -xzf - 2>/tmp/tarerr
                      echo "TAR_EXIT=$?"
                      echo "===== TAR STDERR (tail 50) ====="; tail -50 /tmp/tarerr
                    '
              # /opt/proto-moon/.env собирается ИЗ СЕКРЕТОВ заново КАЖДЫЙ деплой
              # (cat > затирает файл) → правка .env руками по ssh бесполезна.
              # Содержит GitHub-токен (кнопка-синк пушит в main) и ключи облака
              # (server.mjs/пайплайн пишут и отдают медиа из бакета).
              # Всё идёт по stdin, не светится в списке процессов; .env = 600.
              - |
                # strip срезает \r\n: трейлинг-перенос при копи-пасте секрета
                # ломает токен/ключ («Invalid token» / «SignatureDoesNotMatch»).
                strip() { printf '%s' "$1" | tr -d '\r\n'; }
                tok=$(strip "$SYNC_GIT_TOKEN")
                ak=$(strip "$UPLOADS_ACCESS_KEY_ID")
                sk=$(strip "$UPLOADS_SECRET_ACCESS_KEY")
                up=$(strip "$UPLOAD_PASSWORD")
                env_body=$(
                  [ -n "$tok" ] && printf 'GITHUB_TOKEN=%s\n' "$tok"
                  if [ -n "$ak" ] && [ -n "$sk" ]; then
                    printf 'UPLOADS_BUCKET=%s\n' 'proto-design-okds-uploads'
                    printf 'UPLOADS_PUBLIC_BASE=%s\n' 'https://proto-design-okds-uploads.storage.yandexcloud.net/'
                    printf 'UPLOADS_ACCESS_KEY_ID=%s\n' "$ak"
                    printf 'UPLOADS_SECRET_ACCESS_KEY=%s\n' "$sk"
                    [ -n "$up" ] && printf 'UPLOAD_PASSWORD=%s\n' "$up"
                  fi
                )
                # Пишем .env ТОЛЬКО если есть что писать — иначе не трогаем файл
                # (пустой `cat >` затёр бы существующий .env с токеном).
                if [ -n "$env_body" ]; then
                  printf '%s' "$env_body" | ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$DEPLOY_USER@$DEPLOY_HOST" "umask 077 && cat > /opt/proto-moon/.env && echo ENV_WRITTEN=ok || echo ENV_WRITTEN=FAIL"
                else
                  echo "ENV: секреты не заданы — .env не трогаем (пропуск)"
                fi
              # Пересборка/перезапуск. ДИАГНОСТИКА: код возврата + последние строки
              # сборки (раньше тоже могли «молча» падать). Не прерываем ран.
              - |
                ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$DEPLOY_USER@$DEPLOY_HOST" '
                  cd /opt/proto-moon || { echo "CD_FAIL=$?"; exit 0; }
                  echo "===== COMPOSE UP --build ====="
                  docker compose up -d --build > /tmp/compose.log 2>&1
                  echo "COMPOSE_EXIT=$?"
                  tail -100 /tmp/compose.log
                  echo "===== COMPOSE PS ====="; docker compose ps 2>&1
                  docker image prune -f >/dev/null 2>&1 || true
                '
