# SourceCraft CI/CD — автодеплой прототипа на Yandex Compute Cloud по SSH.
#
# На каждый push в main: код упаковывается tar'ом, отправляется на VM по ssh
# в /opt/proto-moon и контейнер пересобирается/перезапускается
# (docker compose up -d --build). Сервис — server.mjs (раздача статики + синк
# ленты из Google-таблицы). VM всегда включена → кнопка «Обновить ленту» и
# синк при старте работают стабильно (как было на Railway).
#
# Секреты в SourceCraft (Settings → Secrets репозитория-зеркала):
#   DEPLOY_SSH_KEY            — приватный SSH-ключ для входа на VM, base64.
#                               (выдаётся отдельно; на Маке: base64 < key | pbcopy)
#   SYNC_GIT_TOKEN            — GitHub PAT с правом записи (кнопка-синк пушит в main).
#   UPLOADS_ACCESS_KEY_ID     — ключ S3-бакета загрузок (облако для медиа).
#   UPLOADS_SECRET_ACCESS_KEY — секрет S3-бакета.
#   UPLOAD_PASSWORD           — пароль на страницу загрузки /content (по желанию).
# Все, кроме DEPLOY_SSH_KEY, опциональны: не задан → соответствующая фича просто
# выключена. CI собирает из них /opt/proto-moon/.env на каждом деплое (см. ниже).
# Адрес сервера и пользователь не секретны — заданы ниже в env.

on:
  push:
    - workflows: [deploy]
      filter:
        branches: ["main"]

workflows:
  deploy:
    tasks:
      - name: deploy-to-yandex
        cubes:
          - name: ship
            image: docker.io/library/alpine:3.20
            env:
              DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
              DEPLOY_HOST: "89.169.132.5"   # VM ok-ds-vm (id fhm4fsj5ia9nbh9th9p6)
              DEPLOY_USER: "yc-user"
              # GitHub-токен (PAT с правом записи) — чтобы кнопка-синк пушила
              # результат в main. Добавь в SourceCraft → Settings → Secrets как
              # SYNC_GIT_TOKEN. Не задан → кнопка работает, но без пуша.
              SYNC_GIT_TOKEN: ${{ secrets.SYNC_GIT_TOKEN }}
              # Облако для медиа (S3 / Yandex Object Storage). Добавь в SourceCraft
              # → Settings → Secrets. Не заданы → дисковый режим (как раньше).
              # Имя бакета и публичная база не секретны — зашиты ниже литералом.
              UPLOADS_ACCESS_KEY_ID: ${{ secrets.UPLOADS_ACCESS_KEY_ID }}
              UPLOADS_SECRET_ACCESS_KEY: ${{ secrets.UPLOADS_SECRET_ACCESS_KEY }}
              UPLOAD_PASSWORD: ${{ secrets.UPLOAD_PASSWORD }}
            script:
              - apk add --no-cache openssh-client tar
              - mkdir -p ~/.ssh && chmod 700 ~/.ssh
              # Ключ хранится в секрете как base64 — декодируем обратно в файл.
              - printf '%s' "$DEPLOY_SSH_KEY" | base64 -d > ~/.ssh/id_deploy
              - chmod 600 ~/.ssh/id_deploy
              # ─── ЗАЛИВКА: развязка tar и ssh (ФИКС + лёгкая диагностика) ───────
              # Было: `tar | ssh "tar -x"`. Под pipefail весь шаг падал, если CI-tar
              # вернул не ноль (а удалённая распаковка при этом успешна) → ран молча
              # обрывался ДО сборки. Теперь: локальный tar пишем в ФАЙЛ (его код —
              # отдельно, шаг не валит), затем стримим в удалённую распаковку. Падаем
              # только на РЕАЛЬНОЙ ошибке удалённого tar (REMOTE_TAR_EXIT).
              #
              # ─── ПРЕ-ДЕПЛОЙ ДИАГНОСТИКА (в ВИДИМОМ окне лога, ДО tar) ──────────
              # Деплой зелёный, но контейнер не пересоздаётся (build застрял на
              # leanfix-1 даже после --force-recreate + снос порта-80). Финальный
              # compose-шаг с PS_ALL_BEFORE/BUILD_EXIT идёт ПОСЛЕ REMOTE_TAR_EXIT,
              # докуда лог обычно и обрезают — мы его не видим. Поэтому печатаем
              # состояние VM ДО любых изменений, в первой (всегда видимой) части:
              #   PS_BEFORE  — кто реально держит порт 80 и из какого образа
              #                (вдруг контейнер запущен ВНЕ compose → его down/
              #                force-recreate не трогает = H3);
              #   COMPOSE_PS — знает ли compose-проект /opt/proto-moon про этот
              #                контейнер вообще;
              #   SERVED_BUILD — какой build сейчас реально отдаётся (healthz).
              - |
                ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$DEPLOY_USER@$DEPLOY_HOST" '
                  echo "=== PRE-DEPLOY DIAG ==="
                  echo "PS_BEFORE:"; docker ps -a --format "{{.Names}} | {{.Image}} | {{.Ports}} | {{.Status}}"
                  echo "COMPOSE_PS:"; (cd /opt/proto-moon && docker compose ps 2>&1 | tail -8) || echo "(no compose dir)"
                  echo -n "SERVED_BUILD="; curl -s -m 3 localhost/healthz | head -c 200; echo
                  docker system prune -af >/dev/null 2>&1 || true
                  df -h / | tail -1
                '
              # ─── .env ИЗ СЕКРЕТОВ (пишем ДО деплоя; распаковка кода его не трогает) ──
              # /opt/proto-moon/.env пересобирается из секретов на каждом деплое:
              # GitHub-токен (кнопка-синк пушит в main) + ключи облака (медиа). Идёт
              # по stdin (не светится в списке процессов), .env = 600. Ни один секрет
              # не задан — существующий .env на VM НЕ трогаем (пустой cat> затёр бы
              # токен). Собираем построчно во временный файл, БЕЗ обёртки $(...) над
              # многострочным телом с комментариями — она хрупка в busybox-sh раннера.
              - |
                # strip срезает \r\n: трейлинг-перенос при копи-пасте секрета
                # ломает токен/ключ («Invalid token» / «SignatureDoesNotMatch»).
                strip() { printf '%s' "$1" | tr -d '\r\n'; }
                tok=$(strip "$SYNC_GIT_TOKEN")
                ak=$(strip "$UPLOADS_ACCESS_KEY_ID")
                sk=$(strip "$UPLOADS_SECRET_ACCESS_KEY")
                up=$(strip "$UPLOAD_PASSWORD")
                envf=$(mktemp)
                [ -n "$tok" ] && printf 'GITHUB_TOKEN=%s\n' "$tok" >> "$envf"
                if [ -n "$ak" ] && [ -n "$sk" ]; then
                  printf 'UPLOADS_BUCKET=%s\n' 'proto-design-okds-uploads' >> "$envf"
                  printf 'UPLOADS_PUBLIC_BASE=%s\n' 'https://proto-design-okds-uploads.storage.yandexcloud.net/' >> "$envf"
                  printf 'UPLOADS_ACCESS_KEY_ID=%s\n' "$ak" >> "$envf"
                  printf 'UPLOADS_SECRET_ACCESS_KEY=%s\n' "$sk" >> "$envf"
                  [ -n "$up" ] && printf 'UPLOAD_PASSWORD=%s\n' "$up" >> "$envf"
                fi
                if [ -s "$envf" ]; then
                  ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$DEPLOY_USER@$DEPLOY_HOST" "umask 077 && cat > /opt/proto-moon/.env && echo ENV_WRITTEN=ok || echo ENV_WRITTEN=FAIL" < "$envf"
                else
                  echo "ENV: секреты не заданы — .env не трогаем (пропуск)"
                fi
                rm -f "$envf"
              # ─── АТОМАРНЫЙ ДЕПЛОЙ: распаковка + build + recreate в ОДНОМ ssh ──────
              # Корень бага «контейнер не пересоздаётся»: реальные build + up были
              # ПОСЛЕДНИМ из череды отдельных ssh-шагов, а прямо перед ними сидела
              # диагностика DEPLOYED_BUILD (grep build: server.mjs | head -c 90):
              # она печатала ОБРЕЗАННУЮ по 90 байт строку healthz-исходника, рвущуюся
              # на непарной «(» (...isUploadConfigured(). В busybox-sh раннера разбор
              # такого вывода падал с «syntax error: unexpected end of file (expecting
              # close-paren)» — РАНЬШЕ сборки. Оттого логи всегда обрывались на REMOTE_TAR_EXIT,
              # секции COMPOSE/BUILD не было видно, на VM крутился старый образ
              # (healthz застывал на старом build, lastSync.reason — на manual: контейнер
              # ни разу не рестартовал), а правки внутри недостижимого шага (#667–#669)
              # ничего не меняли. Чиним структурой, а не диагностикой: между «код
              # приехал» и «контейнер пересоздан» больше НЕТ границы шага, где ран мог
              # бы молча оборваться. Распаковка → build → down → up --force-recreate →
              # проверка healthz идут в одном сеансе. Падаем (red) только на реальной
              # ошибке сборки/запуска (с хвостом build-лога); распаковка не удалась →
              # старый контейнер остаётся жив, без простоя. Проверка просто печатает
              # JSON healthz, не парсит его в шелле — никаких grep исходника.
              - |
                tar --exclude='./node_modules' -C /sourcecraft/workspace -czf /tmp/code.tgz . \
                  && echo "LOCAL_TAR_OK ($(wc -c </tmp/code.tgz) bytes)" \
                  || echo "LOCAL_TAR_WARN=$? (продолжаем — архив создан)"
                ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$DEPLOY_USER@$DEPLOY_HOST" '
                  cd /opt/proto-moon || { echo "FATAL: нет каталога /opt/proto-moon"; exit 9; }
                  # 1) Свежий код: tar приходит на stdin. Распаковка упала — НЕ трогаем
                  #    работающий контейнер (старый код продолжает отдаваться).
                  if tar -xzf -; then echo "UNTAR_OK"; else echo "UNTAR_FAIL"; exit 11; fi
                  echo "PS_BEFORE:"; docker ps -a --format "{{.Names}} | {{.Image}} | {{.Status}}"
                  # 2) Собрать образ (старый контейнер ещё жив — без простоя при ошибке).
                  docker compose build > /tmp/build.log 2>&1; b=$?; echo "BUILD_EXIT=$b"; tail -25 /tmp/build.log
                  if [ "$b" -ne 0 ]; then echo "BUILD_FAILED — оставляем старый контейнер"; exit "$b"; fi
                  # 3) Снести старое: compose-контейнеры/orphans + ЛЮБОЙ контейнер на порту 80.
                  docker compose down --remove-orphans 2>&1 | tail -4
                  docker ps -aq --filter "publish=80" | xargs -r docker rm -f 2>&1 || true
                  # 4) Поднять заново из свежего образа.
                  docker compose up -d --force-recreate > /tmp/up.log 2>&1; u=$?; echo "UP_EXIT=$u"; cat /tmp/up.log
                  echo "PS_AFTER:"; docker ps -a --format "{{.Names}} | {{.Image}} | {{.Status}}"
                  docker image prune -f >/dev/null 2>&1 || true
                  # 5) Что РЕАЛЬНО отдаётся теперь. lastSync.reason=startup и новый build
                  #    = контейнер физически пересоздан. JSON печатаем как есть, не парсим.
                  sleep 2; echo -n "SERVED_AFTER="; curl -s -m 5 localhost/healthz | head -c 220; echo
                  exit "$u"
                ' < /tmp/code.tgz
