# SourceCraft CI/CD — автодеплой прототипа на Yandex Compute Cloud по SSH.
#
# На каждый push в main: код упаковывается tar'ом, отправляется на VM по ssh
# в /opt/proto-moon и контейнер пересобирается/перезапускается
# (docker compose up -d --build). Сервис — server.mjs (раздача статики + синк
# ленты из Google-таблицы). VM всегда включена → кнопка «Обновить ленту» и
# синк при старте работают стабильно (как было на Railway).
#
# Нужен ОДИН секрет в SourceCraft (Settings → Secrets):
#   DEPLOY_SSH_KEY — приватный SSH-ключ, закодированный в base64.
#                    (выдаётся отдельно; на Маке: base64 < key | pbcopy)
# Адрес сервера и пользователь не секретны — заданы ниже в env.

on:
  push:
    - workflows: [deploy]
      filter:
        branches: ["main"]

workflows:
  deploy:
    tasks:
      - name: deploy-to-yandex
        cubes:
          - name: ship
            image: docker.io/library/alpine:3.20
            env:
              DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
              DEPLOY_HOST: "89.169.132.5"   # VM ok-ds-vm (id fhm4fsj5ia9nbh9th9p6)
              DEPLOY_USER: "yc-user"
            script:
              - apk add --no-cache openssh-client tar
              - mkdir -p ~/.ssh && chmod 700 ~/.ssh
              # Ключ хранится в секрете как base64 — декодируем обратно в файл.
              - printf '%s' "$DEPLOY_SSH_KEY" | base64 -d > ~/.ssh/id_deploy
              - chmod 600 ~/.ssh/id_deploy
              # Заливаем код на VM (tar по ssh) в /opt/proto-moon.
              # .git ВКЛЮЧАЕМ (нужен для кнопки-коммита на VM); исключаем только node_modules.
              # tar затирает /opt/proto-moon содержимым main → VM каждый деплой
              # приходит к чистому main (любые in-container правки сбрасываются).
              - tar --exclude='./node_modules' -C /sourcecraft/workspace -czf - . | ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$DEPLOY_USER@$DEPLOY_HOST" "tar -C /opt/proto-moon -xzf -"
              # Пересобираем и перезапускаем контейнер на VM.
              - ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$DEPLOY_USER@$DEPLOY_HOST" "cd /opt/proto-moon && docker compose up -d --build && docker image prune -f"
