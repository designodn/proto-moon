<style>
  * { -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--dynamic-surface-base-secondary);
  }
  .phone-frame { background: var(--dynamic-surface-base-secondary); }
  .meshok-up .status-bar,
  .meshok-up .nav-bar {
    background-color: var(--dynamic-surface-base-secondary) !important;
  }

  /* Заголовок-хэштег в навбаре по центру страницы. */
  .ll-mar-nav { position: relative; }
  .ll-mar-nav__title {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    color: var(--dynamic-text-and-icons-base-primary); pointer-events: none;
  }

  /* ── Шапка: счётчик участников + описание + CTA, по центру ── */
  .ll-mar-head {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 0 var(--space-4) var(--space-6);   /* низ 24 = от кнопки до 1 места */
  }
  .ll-mar-head__count { margin: 0; color: var(--dynamic-text-and-icons-base-secondary); }          /* 0 от хэштега (навбар) */
  .ll-mar-head__desc  { margin: var(--space-2) 0 0; color: var(--dynamic-text-and-icons-base-primary); }  /* 8 от счётчика */
  .ll-mar-head__cta   { margin-top: var(--space-3); width: 100%; }                                  /* 12 от описания */

  /* ── Лента работ ── */
  .ll-mar-grid {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: var(--space-4);              /* hero → masonry 16 */
    padding: 0 var(--space-2) 32px;   /* гор. паддинги 8, низ 32 */
  }
  /* masonry: первая карточка 100%, ниже два столбика; между ними 8, в столбике 16. */
  .ll-mar-masonry {
    display: flex;
    gap: var(--space-2);             /* между столбиками 8 */
    align-items: flex-start;
  }
  .ll-mar-col {
    flex: 1 1 0;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: var(--space-4);             /* в каждом столбике 16 */
  }

  /* Карточка работы: media (rounded-16, тонкий бордер) + футер автор/лайки. */
  .ll-mar-card {
    display: flex;
    flex-direction: column;
    gap: var(--space-2);           /* от фото до авы 8 */
    text-decoration: none;
    color: inherit;
    transition: transform 200ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .ll-mar-card:active { transform: scale(0.98); }

  .ll-mar-card__media {
    position: relative;
    display: block;
    border-radius: 16px;
    overflow: hidden;
    background: var(--dynamic-surface-contrast-low);
    /* обводка contrast-low ВНУТРИ карточки (не влияет на размер/пропорцию) */
    box-shadow: inset 0 0 0 1px var(--dynamic-stroke-contrast-low);
  }
  .ll-mar-card__media img { display: block; width: 100%; height: 100%; object-fit: cover; }
  /* три поддерживаемые пропорции фото */
  .ll-mar-card__media.__ar-16-9 { aspect-ratio: 16 / 9; }
  .ll-mar-card__media.__ar-1-1  { aspect-ratio: 1 / 1; }
  .ll-mar-card__media.__ar-9-16 { aspect-ratio: 9 / 16; }

  /* Бейдж-ранг: оранжевая «закладка» с уголком снизу, в правом верхнем углу. */
  .ll-mar-card__rank {
    position: absolute;
    top: 0;
    right: 16px;
    width: 24px;
    height: 32px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 3px;
    color: #fff;
    font-family: var(--font-family);
    font-size: 15px;
    font-weight: 600;
    line-height: 20px;
    letter-spacing: 0.3px;
    background: var(--static-surface-status-accent, #F64A00);
    clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 80%, 0 100%);
  }

  .ll-mar-card__footer {
    display: flex;
    align-items: center;
    gap: var(--space-2);             /* контейнер авы/имени/кнопки — гэп 8 */
  }
  .ll-mar-card__name {
    flex: 1 1 0;
    min-width: 0;
    color: var(--dynamic-text-and-icons-base-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ll-mar-card__likes { flex-shrink: 0; }
</style>

  <script src="components/back-button.js"></script>
  <!-- Делегированный переход по data-href (кнопка «Загрузить фото» → форма). -->
  <script>
    document.addEventListener('click', function (e) {
      var btn = e.target.closest && e.target.closest('[data-href]');
      if (!btn) return;
      e.preventDefault();
      location.href = btn.getAttribute('data-href');
    });

    // Хэштег (заголовок навбара) и счётчик участников — из data/marathon.json.
    fetch('data/marathon.json').then(function (r) { return r.json(); }).then(function (d) {
      if (!d || !d.meta) return;
      if (d.meta.hashtag) document.getElementById('marNavTitle').textContent = d.meta.hashtag;
      if (d.meta.participants) document.getElementById('marCount').textContent = d.meta.participants;
      if (d.meta.description) document.getElementById('marDesc').textContent = d.meta.description;
    }).catch(function () {});
  </script>
