<!DOCTYPE html>
<html lang="ru" class="__ui-theme_enabled __ui-theme_light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Профиль — New Vision</title>
<link rel="stylesheet" href="new-vision.css">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: var(--dynamic-surface-base-secondary); }
  * { -webkit-tap-highlight-color: transparent; }

  /* fill-container: phone-frame на всю ширину/высоту окна (как в lenta.html),
     чтобы tabbar приклеивался к нижнему краю. */
  .phone-frame { width: 100%; max-width: none; height: 100dvh; min-height: 100dvh; }

  /* ── ОБЛОЖКА — самодостаточная шапка поверх оранжевого градиента ──────────
     meshok-up здесь не годится: его status-bar жёстко светлый. Поэтому статус
     и навбар встроены в обложку и скроллятся вместе с ней (как в макете).
     Весь контент белый. */
  .nv-pr-cover {
    position: relative;
    color: var(--static-text-and-icons-base-inverse-primary);
    /* радиальный оранжевый из макета (FA8D69 → F23C00) */
    background:
      radial-gradient(116% 78% at 50% 24%,
        #FA8D69 0%, #F86F4F 28%, #F55020 62%, #F2480D 84%, #F23C00 100%);
    padding-bottom: var(--space-4);
    overflow: hidden;
  }
  /* статус-бар: переиспользуем разметку .status-bar, но без светлого фона */
  .nv-pr-cover .status-bar {
    position: static;
    background: transparent !important;
    color: inherit;
  }
  .nv-pr-cover .status-bar__indicators { color: inherit; }

  .nv-pr-cover__nav {
    display: flex; align-items: center; justify-content: space-between;
    min-height: 48px; padding: var(--space-2) var(--space-3);
    gap: var(--space-2);
  }

  /* dev-переключатель состояний — компактный сегмент в правой части навбара */
  .nv-pr-switch {
    display: inline-flex; align-items: center; gap: 2px;
    padding: 2px; border-radius: 12px;
    background: var(--dynamic-surface-contrast-on-color-inverse-high);
  }
  .nv-pr-switch button {
    appearance: none; border: 0; cursor: pointer;
    background: transparent; color: inherit;
    font: 600 12px/1 var(--font-family);
    padding: 6px 8px; border-radius: 10px;
    transition: background-color 160ms ease;
  }
  .nv-pr-switch button.__active { background: rgba(255,255,255,0.92); color: var(--base-black-100, #000); }

  .nv-pr-cover__body {
    display: flex; flex-direction: column; align-items: center;
    gap: var(--space-4); padding: var(--space-2) var(--space-4) 0;
  }
  .nv-pr-cover__head { display: flex; flex-direction: column; align-items: center; gap: var(--space-4); width: 100%; }
  .nv-pr-cover__avatar { box-shadow: 0 8px 24px -8px rgba(0,0,0,0.24); }
  .nv-pr-cover__texts { display: flex; flex-direction: column; align-items: center; gap: var(--space-2); text-align: center; width: 100%; }
  .nv-pr-cover__name { margin: 0; }
  .nv-pr-cover__sub  { margin: 0; opacity: 0.92; }

  /* CTA-ряд: лейбловая кнопка растягивается, две круглые — фикс */
  .nv-pr-cta { display: flex; align-items: stretch; gap: var(--space-2); width: 100%; }
  .nv-pr-cta[hidden] { display: none; }
  .nv-pr-cta .button-content { gap: var(--space-2); }

  /* ── СТАТИСТИКА — горизонтальный скролл-ряд (друзья/фото/группы/…) ───────── */
  .nv-pr-stats {
    display: flex; gap: var(--space-5); align-items: flex-start;
    padding: var(--space-4); overflow-x: auto;
    background: var(--dynamic-surface-base-quaternary);
    scrollbar-width: none;
  }
  .nv-pr-stats::-webkit-scrollbar { display: none; }
  .nv-pr-stat {
    appearance: none; border: 0; background: transparent; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: var(--space-3);
    flex: 0 0 auto; padding: 0;
    color: var(--dynamic-text-and-icons-base-primary);
    transition: transform 400ms cubic-bezier(0, -0.3, 0.5, 1.3);
  }
  .nv-pr-stat:active { transform: scale(0.95); }
  .nv-pr-stat__num { white-space: nowrap; }
  /* квадратные превью (фото/заметка) — скруглённые, лёгкий наклон-стек */
  .nv-pr-thumbs { position: relative; width: 44px; height: 44px; }
  .nv-pr-thumb {
    position: absolute; inset: 0; margin: auto; width: 30px; height: 30px;
    border-radius: 8px; object-fit: cover; border: 1.5px solid var(--dynamic-surface-base-quaternary);
    box-shadow: 0 6px 18px -8px rgba(0,0,0,0.18);
    background: var(--dynamic-surface-contrast-low);
  }
  .nv-pr-thumb.__a { transform: rotate(-8deg) translateX(-3px); }
  .nv-pr-thumb.__b { transform: rotate(9deg) translateX(3px); }
  .nv-pr-thumb.__solo { width: 36px; height: 36px; }

  /* ── ПАНЕЛЬ «БОНСАЙ» ─────────────────────────────────────────────────────── */
  .nv-pr-bonsai {
    position: relative; display: flex; align-items: center;
    padding: var(--space-4);
    background: var(--dynamic-surface-base-quaternary);
  }
  .nv-pr-bonsai__text { display: flex; flex-direction: column; gap: var(--space-3); align-items: flex-start; max-width: 60%; }
  .nv-pr-bonsai__title { margin: 0; }
  .nv-pr-bonsai__sub { margin: 0; color: var(--dynamic-text-and-icons-base-primary); }
  .nv-pr-bonsai__art {
    position: absolute; right: var(--space-4); top: 50%; transform: translateY(-50%);
    font-size: 92px; line-height: 1; filter: drop-shadow(0 8px 16px rgba(0,0,0,0.12));
    pointer-events: none; user-select: none;
  }

  /* лёгкий разделитель-зазор между белыми блоками и лентой */
  .nv-pr-feed-gap { height: var(--space-1); background: var(--dynamic-surface-base-secondary); }

  .feed-base.island > .uni-cell-wrapper { padding-top: var(--space-3); }
</style>
</head>
<body data-view="friend">

              <button class="button-circle" aria-label="Ещё">

      <!-- ЛЕНТА АВТОРА -->
      <div class="feed-container">

        <!-- Пост 1 — одно фото -->
        <article class="feed-base island">

            <div class="contents-view-container uni-cell-additional-content">

        <!-- Пост 2 — галерея 2×2 -->
        <article class="feed-base island">
          <div class="uni-cell-wrapper"><div class="uni-cell-container"><div class="uni-cell">
            <div class="avatar __size-36 __type-image"><img src="https://i.pravatar.cc/128?img=45" data-pr-avatar alt=""></div>
            <div class="contents-view-container uni-cell-additional-content">
              <div class="ds-title-s" data-pr-name>Ольга Вайнер</div>

            </div>
          </div></div></div>
          <div class="feed-text">
            <p class="feed-text__body ds-body-m">Суздаль, Владимирская область</p>
          </div>
          <div class="media __type-gallery">
            <div class="media__cell"><img src="https://picsum.photos/seed/suzdal1/400/400" alt=""></div>

          </div>
          <div class="actions-bar">
            <label class="button-wrapper __size-36 button-klass" style="--button-klass-count: 34;"><input type="checkbox" hidden><span class="button-container __style-secondary"><span class="button-content"><span class="button-klass__icon-outline icon __size-20 __slot-klass-outline"></span><span class="button-klass__icon-filled icon __size-20 __slot-klass-filled"></span>&nbsp;<span class="button-klass__count"></span></span></span></label>
            <div class="button-wrapper __size-36"><button class="button-container __style-secondary"><span class="button-content"><span class="icon __size-20 __slot-comment"></span>&nbsp;14</span></button></div>

      <div style="height: 96px"></div>

    <!-- TABBAR — профиль открывается из «Меню» -->

  </div>

  <script src="../components/tab-bar.js"></script>
  <script>
    // ── Состояния профиля: self | friend | stranger ────────────────────────
    // Источник истины — ?view= в URL; переключатель в шапке его же и меняет.
    var VIEWS = {
      self:     { name: 'Анастасия Кащеева', sub: 'Это ваш профиль' },
      friend:   { name: 'Ольга Вайнер',      sub: 'Родилась 2 сентября (26 лет)' },
      stranger: { name: 'Ольга Вайнер',      sub: 'Родилась 2 сентября (26 лет)' }
    };

    function applyView(view) {
      if (!VIEWS[view]) view = 'friend';
      document.body.setAttribute('data-view', view);

      // CTA-ряды
      document.querySelectorAll('.nv-pr-cta').forEach(function (el) {
        el.hidden = el.getAttribute('data-cta') !== view;
      });

      // Имя / подпись / аватар (self — другой человек: вы)
      var data = VIEWS[view];
      document.querySelectorAll('[data-pr-name]').forEach(function (el) { el.textContent = data.name; });
      document.querySelectorAll('[data-pr-sub]').forEach(function (el)  { el.textContent = data.sub;  });

      // переключатель
      document.querySelectorAll('.nv-pr-switch [data-set-view]').forEach(function (b) {
        b.classList.toggle('__active', b.getAttribute('data-set-view') === view);
      });
    }

    // init из URL
    var initial = new URLSearchParams(location.search).get('view') || 'friend';
    applyView(initial);

    // клики по переключателю — меняем состояние + ?view= без перезагрузки
    document.querySelector('.nv-pr-switch').addEventListener('click', function (e) {
      var btn = e.target.closest('[data-set-view]');
      if (!btn) return;
      var view = btn.getAttribute('data-set-view');
      var url = new URL(location.href);
      url.searchParams.set('view', view);
      history.replaceState(null, '', url);
      applyView(view);
    });

    // делегированный переход по data-href (back → лента)
    document.addEventListener('click', function (e) {
      var el = e.target.closest('[data-href]');
      if (!el) return;
      var href = el.getAttribute('data-href');
      if (href) location.href = href;
    });
  </script>
</body>
</html>
