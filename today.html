<!DOCTYPE html>
<html lang="ru" class="__ui-theme_enabled __ui-theme_light __font-roboto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Сегодня — прототип</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600&display=swap">
<link rel="stylesheet" href="index.css">
<!-- В head синхронно: listener pagereveal должен зарегистрироваться до события -->
<script src="components/screen-transition.js"></script>
<style>
  * { -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--dynamic-surface-base-secondary); }
  .phone-frame { width: 100%; max-width: none; height: 100dvh; min-height: 100dvh; overflow: hidden;
                 background: var(--dynamic-surface-base-secondary); }
  .phone-frame__feed { min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .phone-frame__feed::-webkit-scrollbar { display: none; }
  .ll-icon { display: inline-block; flex-shrink: 0; vertical-align: middle; }
  .ll-tabbar { position: fixed; left: 0; right: 0; bottom: 0; z-index: 50; }

  /* Оранжевая локация справа в навбаре */
  .tg-location { color: var(--static-surface-status-accent); }

  /* ============================================================
     ЛЕНТА «Сегодня» — вертикальный ритм 12px между секциями,
     нижний клиренс под прибитый таббар.
     ============================================================ */
  .tg-feed {
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
    padding-top: var(--space-2);
    padding-bottom: calc(72px + var(--space-6));
  }
  /* Острова контента — поля по 8px (как во всех discovery-фреймах Figma) */
  .tg-island { padding: 0 var(--space-2); }
  /* Две карточки в ряд (погода+луна, мини-аппы) */
  .tg-duo { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-2); }

  /* ============================================================
     ЗАГОЛОВОК СЕКЦИИ: title слева + «Все» (оранжевый) справа.
     На базе DS header, ряд — page-local.
     ============================================================ */
  .tg-sec-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: var(--space-2);
    padding: var(--space-2) var(--space-4) var(--space-1);
  }
  .tg-all {
    flex-shrink: 0;
    border: 0;
    background: none;
    padding: 0;
    font-family: var(--font-family);
    color: var(--static-surface-status-accent);
    cursor: pointer;
  }
  .tg-all:active { opacity: 0.6; }

  /* ============================================================
     КАРУСЕЛЬ — горизонтальный скролл, первый элемент в 8px от края.
     ============================================================ */
  .tg-carousel {
    display: flex;
    gap: var(--space-2);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scroll-snap-type: x mandatory;
    padding: 0 var(--space-2) var(--space-1);
    scrollbar-width: none;
  }
  .tg-carousel::-webkit-scrollbar { display: none; }
  .tg-carousel > * { flex: 0 0 auto; scroll-snap-align: start; }
  .tg-carousel > .__w-300 { width: 300px; }
  .tg-carousel > .__w-168 { width: 168px; }

  /* ============================================================
     FEATURE-BANNER — напоминание о событии (закрываемое).
     ============================================================ */
  .tg-feature {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 16px;
    border-radius: 20px;
    background: var(--dynamic-surface-base-tertiary);
    border: 0.5px solid var(--dynamic-stroke-contrast-low);
  }
  .tg-feature__title { color: var(--dynamic-text-and-icons-base-primary); }
  .tg-feature__actions { display: flex; gap: var(--space-2); }

  /* ============================================================
     «Друзья на сайте» — аватар + имя + online-точка.
     ============================================================ */
  .tg-friend {
    width: 90px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }
  .tg-friend:active { transform: scale(0.95); }
  .tg-friend__ava { position: relative; }
  .tg-friend__dot {
    position: absolute;
    right: 0; bottom: 0;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--static-surface-status-positive, #4bb34b);
    border: 3px solid var(--dynamic-surface-base-secondary);
  }
  .tg-friend__name {
    width: 100%;
    text-align: center;
    color: var(--dynamic-text-and-icons-base-primary);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ============================================================
     UNICARD-баннер «Международный день культуры» — лого ОК в углу.
     ============================================================ */
  .tg-ok-logo {
    width: 36px; height: 36px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--static-surface-status-accent);
    color: #fff; font-weight: 700; font-size: 13px; letter-spacing: -0.3px;
  }

  /* ============================================================
     PROMO «Новое в OK» — карусель: белая карточка на цветной подложке,
     текст + кнопка слева, иллюстрация справа.
     ============================================================ */
  .tg-promo {
    width: 100%;
    border-radius: 20px;
    overflow: hidden;
    background: linear-gradient(120deg, #ff7a33, #ff5500);
    padding: 8px;
    box-sizing: border-box;
  }
  .tg-promo__inner {
    height: 100%;
    box-sizing: border-box;
    background: var(--dynamic-surface-base-secondary);
    border-radius: 14px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .tg-promo__text { flex: 1; display: flex; flex-direction: column; gap: 12px; min-width: 0; }
  .tg-promo__title {
    color: var(--dynamic-text-and-icons-base-primary);
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  .tg-promo__art {
    flex-shrink: 0;
    width: 96px; height: 96px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 40px;
    background: radial-gradient(circle at 30% 30%, #b06ad6, #7d3cb5);
    color: #fff; font-weight: 700;
  }

  /* ============================================================
     NEWS-PORTLET «Сейчас в СМИ» — header + табы-чипы + список + кнопка.
     ============================================================ */
  .tg-news {
    border-radius: 20px;
    background: var(--dynamic-surface-base-tertiary);
    border: 0.5px solid var(--dynamic-stroke-contrast-low);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .tg-news__title { color: var(--dynamic-text-and-icons-base-primary); }
  /* Компактные табы новостей (tabsView 36px) на базе DS chips */
  .tg-news .chips-view__row { gap: var(--space-2); }
  .tg-news .chip-container {
    height: 36px;
    padding: 8px 14px;
    font-size: 14px;
    line-height: 20px;
    --chip-border-radius: 12px;
  }
  .tg-news__list { display: flex; flex-direction: column; gap: 16px; }
  .tg-news__item { display: flex; gap: 12px; align-items: flex-start; cursor: pointer; }
  .tg-news__item:active { opacity: 0.7; }
  .tg-news__src {
    flex-shrink: 0;
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 11px; font-weight: 700;
  }
  .tg-news__text { color: var(--dynamic-text-and-icons-base-primary); }

  /* ============================================================
     ЛУНА — список «можно/нельзя» с иконкой-чипом.
     ============================================================ */
  .tg-moon-list { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
  .tg-moon-row { display: flex; align-items: center; gap: 10px; }
  .tg-moon-ic {
    flex-shrink: 0;
    width: 32px; height: 32px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; font-size: 16px;
    background: rgba(255, 255, 255, 0.18);
  }

  /* ============================================================
     ТЕЛЕПРОГРАММА — ряд лого-каналов.
     ============================================================ */
  .tg-chan-row { display: flex; gap: var(--space-2); overflow-x: auto; padding: 0 var(--space-2) 12px; scrollbar-width: none; }
  .tg-chan-row::-webkit-scrollbar { display: none; }
  .tg-chan {
    flex: 0 0 auto;
    height: 40px; width: 40px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px; color: #fff;
    border: 0; cursor: pointer;
  }
  .tg-chan:active { transform: scale(0.95); }
  .tg-chan.__active { width: 88px; background: var(--static-surface-status-accent); }

  /* TV-карточка: кнопки в ряд снизу + список передач сверху */
  .tg-tv__list { display: flex; flex-direction: column; gap: 2px; margin-top: 8px; }
  .tg-tv__row { color: rgba(255, 255, 255, 0.92); }
  .tg-tv__actions { display: flex; gap: var(--space-2); }

  /* ============================================================
     ОБСУЖДАЮТ СЕЙЧАС — ячейка-тема (uniCell-подобная) с реакцией.
     ============================================================ */
  .tg-topic {
    width: 300px;
    display: flex;
    gap: 12px;
    align-items: center;
    padding: 16px;
    border-radius: 20px;
    background: var(--dynamic-surface-base-tertiary);
    border: 0.5px solid var(--dynamic-stroke-contrast-low);
    cursor: pointer;
    box-sizing: border-box;
  }
  .tg-topic:active { transform: scale(0.99); }
  .tg-topic__text { flex: 1; display: flex; flex-direction: column; gap: 8px; min-width: 0; }
  .tg-topic__title {
    color: var(--dynamic-text-and-icons-base-primary);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .tg-topic__meta { display: flex; align-items: center; gap: 6px; color: var(--dynamic-text-and-icons-base-secondary); }
  .tg-topic__react {
    width: 20px; height: 20px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--static-surface-status-accent); color: #fff; font-size: 11px;
  }
  .tg-topic__thumb {
    flex-shrink: 0;
    width: 68px; height: 68px; border-radius: 14px; overflow: hidden;
    background: var(--dynamic-surface-contrast-low);
  }
  .tg-topic__thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* ============================================================
     СПРАШИВАЮТ СЕЙЧАС (FAQ) — вопрос + ответ + реакции, с разделителем.
     ============================================================ */
  .tg-faq {
    border-radius: 20px;
    background: var(--dynamic-surface-base-tertiary);
    border: 0.5px solid var(--dynamic-stroke-contrast-low);
    padding: 16px;
  }
  .tg-faq__q { display: flex; flex-direction: column; gap: 8px; }
  .tg-faq__question { color: var(--dynamic-text-and-icons-base-primary); }
  .tg-faq__label { color: var(--dynamic-text-and-icons-base-secondary); }
  .tg-faq__answer {
    color: var(--dynamic-text-and-icons-base-primary);
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  .tg-faq__react { display: flex; gap: 16px; margin-top: 4px; }
  .tg-faq__react span { display: inline-flex; align-items: center; gap: 6px; color: var(--dynamic-text-and-icons-base-secondary); }
  .tg-faq__divider { height: 1px; background: var(--dynamic-stroke-contrast-low); margin: 16px 0; }
  .tg-faq__all { display: inline-flex; align-items: center; gap: 6px; margin-top: 16px; color: var(--dynamic-text-and-icons-base-secondary); cursor: pointer; }
</style>
</head>
<body>
  <div class="phone-frame" data-screen>
    <div class="phone-frame__feed">

      <!-- ===== ШАПКА ===== -->
      <div class="meshok-up">
        <div class="status-bar">
          <span class="status-bar__time">9:41</span>
          <span class="status-bar__indicators">
            <img class="ll-icon" src="assets/icons/status-wifi.svg"    width="16" height="12" alt="">
            <img class="ll-icon" src="assets/icons/status-signal.svg"  width="17" height="12" alt="">
            <img class="ll-icon" src="assets/icons/status-battery.svg" width="25" height="12" alt="">
          </span>
        </div>
        <div class="nav-bar">
          <div class="nav-bar__leading">
            <span class="button-inline-wrapper __size-24 __view-secondary">
              <button class="button-inline __size-24 nav-bar__back" aria-label="Назад">
                <span class="button-inline__content"><span class="icon __size-24 __slot-back"></span></span>
              </button>
            </span>
            <span class="ds-title-l">Сегодня</span>
          </div>
          <div class="nav-bar__trailing">
            <span class="tg-location ds-body-m">Санкт-Петербург</span>
          </div>
        </div>
      </div>

      <!-- ===== КОНТЕНТ ===== -->
      <div class="tg-feed">

        <!-- 1. Напоминание о событии (закрываемое) -->
        <section class="tg-island" data-dismiss-row>
          <article class="tg-feature" data-dismiss-target style="background: var(--dynamic-surface-tint-indigo);">
            <div class="tg-feature__title ds-title-s">Вы сегодня записаны на мероприятие «Скандинавская ходьба»</div>
            <div class="tg-feature__actions" style="width: 100%;">
              <span class="button-wrapper __size-36 __style-primary __full-width" style="flex: 1 1 0;">
                <button class="button-container __style-primary"><span class="button-content">Подробнее</span></button>
              </span>
              <span class="button-wrapper __size-36 __style-secondary __full-width" style="flex: 1 1 0;">
                <button class="button-container __style-secondary" data-dismiss="row"><span class="button-content">Скрыть</span></button>
              </span>
            </div>
          </article>
        </section>

        <!-- 2. День рождения друга -->
        <section class="tg-island">
          <article class="cover-card __size-164 __fill"
                   style="--cover-card-bg: url('assets/today/dr-segodnya-fon.png'); color: var(--base-black-100);">
            <div class="cover-card__body">
              <div class="cover-card__top">
                <div class="cover-card__title ds-title-m" style="max-width: 220px;">День Рождения у Виктора Бондарева</div>
              </div>
              <div class="cover-card__bottom" style="align-items: flex-start;">
                <span class="button-wrapper __size-36 __style-primary">
                  <button class="button-container __style-primary"><span class="button-content">Поздравить!</span></button>
                </span>
              </div>
            </div>
            <div class="cover-card__badge __pos-tr" style="top: 16px; right: 16px;">
              <div class="avatar __size-72 __type-image"><img src="https://vki9.okcdn.ru/i?r=CFtAm_VFBkioSGBqh1L1QSPaTBhiOKQvhEp3565WeLYGi-zY12WjPx37MCNleyYFCdfAJ0mKddnUW8c2p6od34wsx5kvnDa03-MlUu9i-nmwZobcW3MFP6Z3k20AAAAp&dpr=2" alt=""></div>
            </div>
          </article>
        </section>

        <!-- 3. Колесо призов -->
        <section class="tg-island">
          <article class="cover-card __size-220 __fill" id="rouletteWidget"
                   role="button" tabindex="0" aria-label="Колесо призов — открыть рулетку"
                   style="--cover-card-bg: url('assets/today/ruletka-segodnya-fon.png'); cursor: pointer;">
            <div class="cover-card__body">
              <div class="cover-card__top">
                <div class="cover-card__title ds-title-xl">Колесо призов</div>
              </div>
              <div class="cover-card__bottom cover-card__cta">
                <span class="button-wrapper __size-44 __style-primary-on-color __full-width">
                  <button class="button-container __style-primary-on-color"><span class="button-content">Крутить</span></button>
                </span>
              </div>
            </div>
          </article>
        </section>

        <!-- 4. Друзья на сайте (люди из data/people.js, рендер ниже) -->
        <div class="tg-sec-head" style="padding: var(--space-3) var(--space-4);">
          <header class="header"><div class="header__title ds-title-xl">Друзья на сайте</div></header>
          <span class="button-inline-wrapper __size-24 __view-primary"><button class="button-inline __size-24"><span class="button-inline__content">Все</span></button></span>
        </div>
        <div class="tg-carousel" id="friendsRow" style="padding-left: var(--space-4);"></div>

        <!-- 5. Какой сегодня день -->
        <div class="tg-sec-head">
          <header class="header"><div class="header__title ds-title-l">Какой сегодня день</div></header>
        </div>
        <section class="tg-island">
          <article class="cover-card __on-image __scrim __size-194"
                   style="--cover-card-image: url('assets/today/segodnya-day.png'); border-radius: 16px;">
            <div class="cover-card__body">
              <div class="cover-card__top"></div>
              <div class="cover-card__bottom">
                <div class="cover-card__title ds-title-xl">Международный день культуры</div>
                <div class="cover-card__subtitle ds-body-m">расскажите о лучших местах вашего города</div>
              </div>
            </div>
            <div class="cover-card__badge __pos-tl"><span class="tg-ok-logo">ОК</span></div>
          </article>
        </section>
      </div>
    </div>

    <!-- ===== TABBAR ===== -->
    <div class="ll-tabbar">
      <div class="tabbar __platform-ios">
        <div class="tabbar__row">
          <button class="tabbar-icon __slot-feed __state-on" aria-label="Лента"></button>
          <button class="tabbar-icon __slot-book" aria-label="Книга"></button>
          <button class="tabbar-icon __slot-message" aria-label="Сообщения"></button>
          <button class="tabbar-icon __slot-clip" aria-label="Клипы"></button>
          <button class="tabbar-icon __slot-menu" aria-label="Меню"></button>
        </div>
        <div class="tabbar__handle"></div>
      </div>
    </div>
  </div>

  <script src="components/dismissible.js"></script>
  <script src="components/tab-bar.js"></script>
  <script src="data/people.js"></script>

  <script>
    // «Друзья на сайте» — реальные люди из реестра people.js.
    (function () {
      var row = document.getElementById('friendsRow');
      if (!row || !window.DS_PEOPLE_DATA) return;
      var IDS = [7, 2, 4, 8, 10];
      var byId = {};
      window.DS_PEOPLE_DATA.forEach(function (p) { byId[p.id] = p; });
      IDS.forEach(function (id) {
        var p = byId[id];
        if (!p) return;
        var item = document.createElement('div');
        item.className = 'tg-friend';
        item.innerHTML =
          '<div class="tg-friend__ava"><div class="avatar __size-56 __type-image"><img alt=""></div></div>' +
          '<div class="tg-friend__name ds-title-m"></div>';
        item.querySelector('img').src = p.photo;
        item.querySelector('.tg-friend__name').textContent = p.name;
        row.appendChild(item);
      });
    })();
  </script>

  <script>
    // Виджет «Колесо призов» → открытие рулетки.
    (function () {
      var w = document.getElementById('rouletteWidget');
      if (!w) return;
      function open() { window.location.href = 'koleso/koleso.html'; }
      w.addEventListener('click', open);
      w.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); }
      });
    })();
  </script>
</body>
</html>
