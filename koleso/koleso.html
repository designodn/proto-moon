<!DOCTYPE html>
<html lang="ru" class="__ui-theme_enabled __ui-theme_light __font-roboto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Колесо призов — прототип</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="../index.css">
<!-- В head синхронно: pagereveal — направление перехода. -->
<script src="../components/screen-transition.js"></script>
<style>
  * { -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; height:100%; background:#f06a00; }

  /* ── Иммерсивный экран на оранжевом градиенте ───────────────────
     status-bar/nav-bar DS форсируют свой фон, поэтому здесь — кастомный
     прозрачный хром с белым контентом поверх «колеса». */
  .rl {
    position: relative;
    width: 100%;
    height: 100dvh;
    min-height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background:
      radial-gradient(120% 70% at 50% 8%, rgba(255,255,255,0.18), rgba(255,255,255,0) 55%),
      linear-gradient(180deg, #ff8a2b 0%, #ff7a14 38%, #f56b00 72%, #e56300 100%);
    color: #fff;
    font-family: var(--font-family);
  }

  .rl-icon { display:inline-block; flex-shrink:0; vertical-align:middle; }
  /* status-иконки нарисованы тёмным → выбеливаем для оранжевого фона */
  .rl-status-ico { filter: brightness(0) invert(1); }

  /* ── Хром: статус-бар + навбар ─────────────────────────────────── */
  .rl-status {
    position: relative; z-index: 20;
    display: flex; align-items: flex-end; justify-content: space-between;
    height: 44px; padding: 8px 24px;
    color: #fff;
  }
  .rl-status__time { font-size: 15px; line-height: 1; font-weight: 600; letter-spacing: -0.3px; }
  .rl-status__ind { display:flex; align-items:center; gap: 7px; }

  .rl-nav {
    position: relative; z-index: 20;
    display: flex; align-items: center; justify-content: space-between;
    height: 56px; padding: 0 16px;
  }
  .rl-nav__btn {
    width: 40px; height: 40px; border: 0; padding: 0; background: transparent;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    color: #fff;
  }
  .rl-nav__btn .rl-icon { filter: brightness(0) invert(1); }

  /* ── «Колесо» — вертикальный барабан призов ────────────────────── */
  .rl-wheel {
    position: relative;
    flex: 1 1 0;
    min-height: 0;
    overflow: hidden;
    display: flex;
    justify-content: center;
    /* плавное затухание призов у верх/низ окна */
    -webkit-mask-image: linear-gradient(180deg, transparent 0%, #000 16%, #000 84%, transparent 100%);
            mask-image: linear-gradient(180deg, transparent 0%, #000 16%, #000 84%, transparent 100%);
  }
  .rl-reel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 220px;
    will-change: transform;
    animation: rl-spin 9s linear infinite;
  }
  .rl .rl-wheel.__fast .rl-reel { animation-duration: 1.1s; }

  /* один приз: 220×220, 3D-эмодзи на «подиуме» */
  .rl-prize {
    position: relative;
    width: 220px; height: 220px;
    flex-shrink: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px;
  }
  .rl-prize__pod {
    width: 168px; height: 168px;
    border-radius: 32px;
    background: #fff;
    box-shadow: 0 18px 40px rgba(120,40,0,0.28), inset 0 1px 0 rgba(255,255,255,0.5);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .rl-prize__img { width: 140px; height: 140px; object-fit: contain; }
  .rl-prize__cap { font-size: 13px; font-weight: 600; color: #fff; text-shadow: 0 1px 4px rgba(120,40,0,0.4); }

  /* анимация прокрутки: -1 копия из двух (см. JS дублирование) */
  @keyframes rl-spin {
    from { transform: translateY(0); }
    to   { transform: translateY(var(--rl-loop, -1824px)); }
  }

  /* ── Кнопки-карточки справа поверх колеса ──────────────────────── */
  .rl-actions {
    position: absolute;
    right: 8px; top: 118px;
    z-index: 15;
    display: flex; flex-direction: column;
    gap: 40px;
    align-items: center;
  }
  .rl-action {
    position: relative;
    width: 106px; height: 110px;
    background: transparent;
    cursor: pointer;
  }
  /* Белая подложка-squircle (radius 20, corner smoothing ~60%), повёрнута на -6.73° как в макете.
     CSS не умеет нативный corner-smoothing → форма задана суперэллипс-контуром через clip-path,
     тень — через drop-shadow (повторяет вырезанную форму). Контент карточки остаётся прямым. */
  .rl-action::before {
    content: ''; position: absolute; inset: 0;
    background: #fff;
    -webkit-clip-path: path('M 20 0 L 86 0 L 90.54 0.03 L 92.69 0.11 L 94.38 0.26 L 95.82 0.46 L 97.08 0.72 L 98.21 1.04 L 99.23 1.41 L 100.16 1.85 L 101 2.35 L 101.77 2.91 L 102.46 3.54 L 103.09 4.23 L 103.65 5 L 104.15 5.84 L 104.59 6.77 L 104.96 7.79 L 105.28 8.92 L 105.54 10.18 L 105.74 11.62 L 105.89 13.31 L 105.97 15.46 L 106 20 L 106 90 L 105.97 94.54 L 105.89 96.69 L 105.74 98.38 L 105.54 99.82 L 105.28 101.08 L 104.96 102.21 L 104.59 103.23 L 104.15 104.16 L 103.65 105 L 103.09 105.77 L 102.46 106.46 L 101.77 107.09 L 101 107.65 L 100.16 108.15 L 99.23 108.59 L 98.21 108.96 L 97.08 109.28 L 95.82 109.54 L 94.38 109.74 L 92.69 109.89 L 90.54 109.97 L 86 110 L 20 110 L 15.46 109.97 L 13.31 109.89 L 11.62 109.74 L 10.18 109.54 L 8.92 109.28 L 7.79 108.96 L 6.77 108.59 L 5.84 108.15 L 5 107.65 L 4.23 107.09 L 3.54 106.46 L 2.91 105.77 L 2.35 105 L 1.85 104.16 L 1.41 103.23 L 1.04 102.21 L 0.72 101.08 L 0.46 99.82 L 0.26 98.38 L 0.11 96.69 L 0.03 94.54 L 0 90 L 0 20 L 0.03 15.46 L 0.11 13.31 L 0.26 11.62 L 0.46 10.18 L 0.72 8.92 L 1.04 7.79 L 1.41 6.77 L 1.85 5.84 L 2.35 5 L 2.91 4.23 L 3.54 3.54 L 4.23 2.91 L 5 2.35 L 5.84 1.85 L 6.77 1.41 L 7.79 1.04 L 8.92 0.72 L 10.18 0.46 L 11.62 0.26 L 13.31 0.11 L 15.46 0.03 L 20 0 Z');
            clip-path: path('M 20 0 L 86 0 L 90.54 0.03 L 92.69 0.11 L 94.38 0.26 L 95.82 0.46 L 97.08 0.72 L 98.21 1.04 L 99.23 1.41 L 100.16 1.85 L 101 2.35 L 101.77 2.91 L 102.46 3.54 L 103.09 4.23 L 103.65 5 L 104.15 5.84 L 104.59 6.77 L 104.96 7.79 L 105.28 8.92 L 105.54 10.18 L 105.74 11.62 L 105.89 13.31 L 105.97 15.46 L 106 20 L 106 90 L 105.97 94.54 L 105.89 96.69 L 105.74 98.38 L 105.54 99.82 L 105.28 101.08 L 104.96 102.21 L 104.59 103.23 L 104.15 104.16 L 103.65 105 L 103.09 105.77 L 102.46 106.46 L 101.77 107.09 L 101 107.65 L 100.16 108.15 L 99.23 108.59 L 98.21 108.96 L 97.08 109.28 L 95.82 109.54 L 94.38 109.74 L 92.69 109.89 L 90.54 109.97 L 86 110 L 20 110 L 15.46 109.97 L 13.31 109.89 L 11.62 109.74 L 10.18 109.54 L 8.92 109.28 L 7.79 108.96 L 6.77 108.59 L 5.84 108.15 L 5 107.65 L 4.23 107.09 L 3.54 106.46 L 2.91 105.77 L 2.35 105 L 1.85 104.16 L 1.41 103.23 L 1.04 102.21 L 0.72 101.08 L 0.46 99.82 L 0.26 98.38 L 0.11 96.69 L 0.03 94.54 L 0 90 L 0 20 L 0.03 15.46 L 0.11 13.31 L 0.26 11.62 L 0.46 10.18 L 0.72 8.92 L 1.04 7.79 L 1.41 6.77 L 1.85 5.84 L 2.35 5 L 2.91 4.23 L 3.54 3.54 L 4.23 2.91 L 5 2.35 L 5.84 1.85 L 6.77 1.41 L 7.79 1.04 L 8.92 0.72 L 10.18 0.46 L 11.62 0.26 L 13.31 0.11 L 15.46 0.03 L 20 0 Z');
    transform: rotate(-6.73deg);
    filter: drop-shadow(0 10px 24px rgba(120,40,0,0.18));
  }
  .rl-action__emoji,
  .rl-action__img {
    position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
    font-size: 64px; line-height: 1;
    filter: drop-shadow(0 8px 10px rgba(120,40,0,0.28));
  }
  .rl-action__img { width: 84px; height: 84px; object-fit: contain; }
  .rl-action__label {
    position: absolute; left: 6px; right: 6px; bottom: 22px;
    text-align: center; font-size: 15px; font-weight: 600; color: #000;
  }
  .rl-action__badge {
    position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%);
    min-width: 24px; height: 24px; box-sizing: border-box;
    padding: 0 6px; border: 3px solid #fff; border-radius: 999px;
    background: #2fb675; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600;
  }
  /* счётчик билетов — пилюля */
  .rl-coin {
    width: 96px; height: 52px;
    background: #fff; border-radius: 20px;
    box-shadow: 0 10px 24px rgba(120,40,0,0.18);
    display: flex; align-items: center; justify-content: center; gap: 6px;
    font-size: 17px; font-weight: 700; color: #000;
  }
  .rl-coin__emoji { font-size: 22px; line-height: 1; }
  .rl-coin__img { width: 26px; height: 26px; object-fit: contain; }

  /* ── Нижняя плашка (meshok ↓): CTA + дисклеймер ─────────────────── */
  .rl-bottom {
    position: relative; z-index: 18;
    padding: 12px 16px;
    background: linear-gradient(180deg, rgba(229,99,0,0) 0%, #e56300 38%);
  }
  /* CTA — каноничная DS-кнопка __size-56 __style-primary-on-color (белый фон) */
  .rl-cta .button-content { gap: 8px; }
  .rl-cta__emoji { font-size: 20px; line-height: 1; }
  .rl-cta__img { width: 24px; height: 24px; object-fit: contain; }
  .rl-disclaimer {
    margin: 12px 0 0;
    text-align: center; font-size: 13px; line-height: 16px; color: #fff;
  }
  .rl-disclaimer a { color: #fff; text-decoration: underline; }
  /* home-indicator */
  .rl-handle { display:flex; justify-content:center; padding: 10px 0 8px; }
  .rl-handle span { width: 108px; height: 4px; border-radius: 12px; background: rgba(255,255,255,0.9); }
</style>
</head>
<body>
  <div class="rl" data-screen>

    <!-- Хром -->
    <div class="rl-status">
      <span class="rl-status__time">9:41</span>
      <span class="rl-status__ind">
        <img class="rl-icon rl-status-ico" src="../assets/icons/status-wifi.svg"    width="16" height="12" alt="">
        <img class="rl-icon rl-status-ico" src="../assets/icons/status-signal.svg"  width="17" height="12" alt="">
        <img class="rl-icon rl-status-ico" src="../assets/icons/status-battery.svg" width="25" height="12" alt="">
      </span>
    </div>
    <div class="rl-nav">
      <button class="rl-nav__btn nav-bar__back" aria-label="Назад" data-href="../start.html">
        <img class="rl-icon" src="../assets/icons/arrow_left_24.svg" width="24" height="24" alt="">
      </button>
      <button class="rl-nav__btn" aria-label="Поделиться">
        <img class="rl-icon" src="../assets/icons/reshare_24.svg" width="24" height="24" alt="">
      </button>
    </div>

    <!-- Колесо -->
    <div class="rl-wheel" id="wheel">
      <div class="rl-reel" id="reel"><!-- призы вставляются из JS (×2 для бесшовного цикла) --></div>
    </div>

    <!-- Кнопки-карточки -->
    <div class="rl-actions">
      <div class="rl-action" role="button" tabindex="0" aria-label="Мои призы">
        <img class="rl-action__img" src="../assets/koleso/moi-prizy.png" alt="">
        <span class="rl-action__label">Мои призы</span>
        <span class="rl-action__badge">2</span>
      </div>
      <div class="rl-action" role="button" tabindex="0" aria-label="Задания" data-href="koleso-tasks.html">
        <img class="rl-action__img" src="../assets/koleso/zadaniia.png" alt="">
        <span class="rl-action__label">Задания</span>
        <span class="rl-action__badge">2</span>
      </div>
      <div class="rl-coin" aria-label="Билеты">
        <span id="coin-count">1</span>
        <img class="rl-coin__img" src="../assets/koleso/biletik.png" alt="">
      </div>
    </div>

    <!-- Нижняя плашка -->
    <div class="rl-bottom">
      <div class="button-wrapper __size-56 __full-width rl-cta" id="cta">
        <button class="button-container __style-primary-on-color">
          <span class="button-content"><span id="cta-text">Крутить колесо за 1</span><img class="rl-cta__img" src="../assets/koleso/biletik.png" alt=""></span>
        </button>
      </div>
      <p class="rl-disclaimer">
        Нажимая «Крутить колесо», вы соглашаетесь<br>
        с <a href="#" onclick="return false">Условиями&nbsp;акции</a>
      </p>
      <div class="rl-handle"><span></span></div>
    </div>
  </div>

  <script>
    // ── Призы барабана ────────────────────────────────────────────
    var PRIZES = [
      { img: 'aifon.png',            c: 'iPhone 15 Pro' },
      { img: 'ozon-promokod.png',    c: 'Промокод OZON' },
      { img: 'telefon.png',          c: 'Смартфон ОК' },
      { img: 'pylesos.png',          c: 'Пылесос' },
      { img: 'fen.png',              c: 'Фен' },
      { img: 'chainik.png',          c: 'Электрочайник' },
      { img: 'gril.png',             c: 'Электрогриль' },
      { img: 'barbekiu.png',         c: 'Гриль-барбекю' },
      { img: 'shveinaia.png',        c: 'Швейная машина' },
      { img: 'mebel.png',            c: 'Кресло' },
      { img: 'chainik-igrushka.png', c: 'Чайник' },
      { img: 'podarok.png',          c: 'Сюрприз' },
      { img: 'oki.png',              c: '1000 ОК' }
    ];

    function prizeNode(p) {
      var el = document.createElement('div');
      el.className = 'rl-prize';
      el.innerHTML = '<div class="rl-prize__pod"><img class="rl-prize__img" src="../assets/koleso/' +
                     p.img + '" alt=""></div><div class="rl-prize__cap">' + p.c + '</div>';
      return el;
    }

    var reel = document.getElementById('reel');
    // дублируем набор дважды — анимация уезжает ровно на один набор и зацикливается без шва
    [0, 1].forEach(function () {
      PRIZES.forEach(function (p) { reel.appendChild(prizeNode(p)); });
    });
    // высота цикла = высота одного набора (tile 220 + gap 8) × N
    var loop = PRIZES.length * (220 + 8);
    reel.style.setProperty('--rl-loop', '-' + loop + 'px');

    // ── Состояние билетов (?tickets=0 → реферальный режим) ────────
    var params = new URLSearchParams(location.search);
    var tickets = parseInt(params.get('tickets'), 10);
    if (isNaN(tickets)) tickets = 1;

    var coin = document.getElementById('coin-count');
    var ctaText = document.getElementById('cta-text');
    var cta = document.getElementById('cta');
    var wheel = document.getElementById('wheel');

    function render() {
      coin.textContent = tickets;
      if (tickets > 0) {
        ctaText.textContent = 'Крутить колесо за ' + tickets;
        cta.dataset.mode = 'spin';
      } else {
        ctaText.textContent = 'Пригласи друга и получи 1';
        cta.dataset.mode = 'invite';
      }
    }
    render();

    cta.addEventListener('click', function () {
      if (cta.dataset.mode === 'invite') {
        location.href = 'koleso-tasks.html';
        return;
      }
      // короткий разгон барабана, затем списываем билет
      if (wheel.classList.contains('__fast')) return;
      wheel.classList.add('__fast');
      setTimeout(function () {
        wheel.classList.remove('__fast');
        tickets = Math.max(0, tickets - 1);
        render();
      }, 2600);
    });

    // делегированная навигация по data-href (карточки/кнопки)
    document.addEventListener('click', function (e) {
      var el = e.target.closest && e.target.closest('[data-href]');
      if (!el || el.classList.contains('nav-bar__back')) return;
      e.preventDefault();
      location.href = el.getAttribute('data-href');
    });
  </script>
</body>
</html>
