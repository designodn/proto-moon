<!DOCTYPE html>
<html lang="ru" class="__ui-theme_enabled __ui-theme_light __font-roboto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Колесо призов — прототип</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="../index.css">
<!-- В head синхронно: pagereveal — направление перехода. -->
<script src="../components/screen-transition.js"></script>
<style>
  * { -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; height:100%; background:#f06a00; }

  /* ── Иммерсивный экран на оранжевом градиенте ───────────────────
     status-bar/nav-bar DS форсируют свой фон, поэтому здесь — кастомный
     прозрачный хром с белым контентом поверх «колеса». */
  .rl {
    position: relative;
    width: 100%;
    height: 100dvh;
    min-height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    /* без градиента — прозрачный слой поверх ровного оранжевого body (#f06a00) */
    background: transparent;
    color: #fff;
    font-family: var(--font-family);
  }

  .rl-icon { display:inline-block; flex-shrink:0; vertical-align:middle; }
  /* status-иконки нарисованы тёмным → выбеливаем для оранжевого фона */
  .rl-status-ico { filter: brightness(0) invert(1); }

  /* ── Хром: статус-бар + навбар ─────────────────────────────────── */
  .rl-status {
    position: absolute; top: 0; left: 0; right: 0; z-index: 20;
    display: flex; align-items: flex-end; justify-content: space-between;
    height: 44px; padding: 8px 24px;
    color: #fff;
  }
  .rl-status__time { font-size: 15px; line-height: 1; font-weight: 600; letter-spacing: -0.3px; }
  .rl-status__ind { display:flex; align-items:center; gap: 7px; }

  .rl-nav {
    position: absolute; top: 44px; left: 0; right: 0; z-index: 20;
    display: flex; align-items: center; justify-content: space-between;
    height: 56px; padding: 0 16px;
  }
  .rl-nav__btn {
    width: 40px; height: 40px; border: 0; padding: 0; background: transparent;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    color: #fff;
  }
  .rl-nav__btn .rl-icon { filter: brightness(0) invert(1); }

  /* ── «Колесо» — вертикальный барабан призов ────────────────────── */
  .rl-wheel {
    position: relative;
    flex: 1 1 0;
    min-height: 0;
    overflow: hidden;
    display: flex;
    justify-content: center;
    /* затухание призов только у нижнего края (верх — полностью видим) */
    -webkit-mask-image: linear-gradient(180deg, #000 0%, #000 84%, transparent 100%);
            mask-image: linear-gradient(180deg, #000 0%, #000 84%, transparent 100%);
  }
  .rl-reel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 220px;
    will-change: transform;
    animation: rl-spin 18s linear infinite;
  }
  .rl .rl-wheel.__fast .rl-reel { animation-duration: 2.2s; }

  /* один приз: 220×220, 3D-эмодзи на «подиуме» */
  .rl-prize {
    position: relative;
    width: 220px; height: 220px;
    flex-shrink: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px;
  }
  .rl-prize__pod {
    width: 168px; height: 168px;
    border-radius: 32px;
    background: #fff;
    box-shadow: 0 18px 40px rgba(120,40,0,0.28), inset 0 1px 0 rgba(255,255,255,0.28);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .rl-prize__emoji { font-size: 96px; line-height: 1; filter: drop-shadow(0 10px 14px rgba(120,40,0,0.35)); }
  /* картинка приза в подиуме (README: 140×140, object-fit:contain) */
  .rl-prize__img { width: 220px; height: 220px; object-fit: contain; display: block; }
  .rl-prize__cap { font-size: 13px; font-weight: 600; color: #fff; text-shadow: 0 1px 4px rgba(120,40,0,0.4); }

  /* анимация прокрутки: -1 копия из двух (см. JS дублирование) */
  @keyframes rl-spin {
    from { transform: translateY(0); }
    to   { transform: translateY(var(--rl-loop, -1824px)); }
  }

  /* ── Кнопки-карточки справа поверх колеса ──────────────────────── */
  .rl-actions {
    position: absolute;
    right: 8px; top: 118px;
    z-index: 15;
    display: flex; flex-direction: column;
    gap: 40px;
    align-items: center;
  }
  .rl-action {
    position: relative;
    width: 106px; height: 110px;
    cursor: pointer;
  }
  /* белая «подложка» с наклоном — размеры/угол из макета: 99.66×96.9, −6.73° */
  .rl-action::before {
    content: ''; position: absolute;
    left: 50%; top: 50%;
    width: 100px; height: 97px;
    background: #fff; border-radius: 20px;
    transform: translate(-50%, -50%) rotate(-6.73deg); z-index: -1;
    box-shadow: 0 10px 24px rgba(120,40,0,0.18);
  }
  .rl-action__emoji {
    position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
    font-size: 64px; line-height: 1;
    filter: drop-shadow(0 8px 10px rgba(120,40,0,0.28));
  }
  /* иконка-картинка кнопки (README: ~84px, «вылет» над карточкой) */
  .rl-action__img {
    position: absolute; bottom: 44px; left: 50%; transform: translateX(-50%);
    width: 88px; height: 88px; object-fit: contain;
    filter: drop-shadow(0 8px 10px rgba(120,40,0,0.28));
  }
  .rl-action__label {
    position: absolute; left: 6px; right: 6px; bottom: 22px;
    text-align: center; font-size: 15px; line-height: 20px; font-weight: 500; color: #2e2f33;
  }
  .rl-action__badge {
    position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%);
    min-width: 24px; height: 24px; box-sizing: border-box;
    padding: 0 6px; border: 3px solid #fff; border-radius: 999px;
    background: #2fb675; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; line-height: 20px; font-weight: 500;
  }
  /* счётчик билетов — пилюля */
  .rl-coin {
    width: 96px; height: 52px;
    background: #fff; border-radius: 20px;
    box-shadow: 0 10px 24px rgba(120,40,0,0.18);
    display: flex; align-items: center; justify-content: center; gap: 6px;
    font-size: 17px; font-weight: 700; color: #000;
  }
  .rl-coin__emoji { font-size: 22px; line-height: 1; }
  .rl-coin__img { width: 26px; height: 26px; object-fit: contain; }

  /* ── Нижняя плашка (meshok ↓): CTA + дисклеймер ─────────────────── */
  .rl-bottom {
    position: relative; z-index: 18;
    padding: 12px 16px;
    background: linear-gradient(180deg, rgba(229,99,0,0) 0%, #e56300 38%);
  }
  /* CTA — каноничная DS-кнопка __size-56 __style-primary-on-color (белый фон) */
  .rl-cta .button-content { gap: 8px; }
  .rl-cta__emoji { font-size: 20px; line-height: 1; }
  .rl-cta__img { width: 24px; height: 24px; object-fit: contain; vertical-align: middle; }
  .rl-disclaimer {
    margin: 12px 0 0;
    text-align: center; font-size: 13px; line-height: 16px; color: #fff;
  }
  .rl-disclaimer a { color: #fff; text-decoration: underline; }
  /* home-indicator */
  .rl-handle { display:flex; justify-content:center; padding: 10px 0 8px; }
  .rl-handle span { width: 108px; height: 4px; border-radius: 12px; background: rgba(255,255,255,0.9); }
</style>
</head>
<body>
  <div class="rl" data-screen>

    <!-- Хром -->
    <div class="rl-status">
      <span class="rl-status__time">9:41</span>
      <span class="rl-status__ind">
        <img class="rl-icon rl-status-ico" src="../assets/icons/status-wifi.svg"    width="16" height="12" alt="">
        <img class="rl-icon rl-status-ico" src="../assets/icons/status-signal.svg"  width="17" height="12" alt="">
        <img class="rl-icon rl-status-ico" src="../assets/icons/status-battery.svg" width="25" height="12" alt="">
      </span>
    </div>
    <div class="rl-nav">
      <button class="rl-nav__btn nav-bar__back" aria-label="Назад" data-href="../start.html">
        <img class="rl-icon" src="../assets/icons/arrow_left_24.svg" width="24" height="24" alt="">
      </button>
      <button class="rl-nav__btn" aria-label="Поделиться">
        <img class="rl-icon" src="../assets/icons/reshare_24.svg" width="24" height="24" alt="">
      </button>
    </div>

    <!-- Колесо -->
    <div class="rl-wheel" id="wheel">
      <div class="rl-reel" id="reel"><!-- призы вставляются из JS (×2 для бесшовного цикла) --></div>
    </div>

    <!-- Кнопки-карточки -->
    <div class="rl-actions">
      <div class="rl-action" role="button" tabindex="0" aria-label="Мои призы">
        <img class="rl-action__img" src="../assets/koleso/moi-prizy.png" alt="">
        <span class="rl-action__label">Мои призы</span>
        <span class="rl-action__badge">2</span>
      </div>
      <div class="rl-action" role="button" tabindex="0" aria-label="Задания" data-href="koleso-tasks.html">
        <img class="rl-action__img" src="../assets/koleso/zadaniia.png" alt="">
        <span class="rl-action__label">Задания</span>
        <span class="rl-action__badge">2</span>
      </div>
      <div class="rl-coin" aria-label="Билеты">
        <span id="coin-count">1</span>
        <img class="rl-coin__img" src="../assets/koleso/biletik.png" alt="">
      </div>
    </div>

    <!-- Нижняя плашка -->
    <div class="rl-bottom">
      <div class="button-wrapper __size-56 __full-width rl-cta" id="cta">
        <button class="button-container __style-primary-on-color">
          <span class="button-content"><span id="cta-text">Крутить колесо за 1</span><img class="rl-cta__img" src="../assets/koleso/biletik.png" alt=""></span>
        </button>
      </div>
      <p class="rl-disclaimer">
        Нажимая «Крутить колесо», вы соглашаетесь<br>
        с <a href="#" onclick="return false">Условиями&nbsp;акции</a>
      </p>
      <div class="rl-handle"><span></span></div>
    </div>
  </div>

  <script>
    // ── Призы барабана (картинки из ../assets/koleso) ─────────────
    var PRIZES = [
      { img: 'aifon.png',            c: 'iPhone' },
      { img: 'ozon-promokod.png',    c: 'Промокод Ozon' },
      { img: 'telefon.png',          c: 'Смартфон' },
      { img: 'pylesos.png',          c: 'Пылесос' },
      { img: 'fen.png',              c: 'Фен' },
      { img: 'chainik.png',          c: 'Чайник' },
      { img: 'chainik-igrushka.png', c: 'Игрушка' },
      { img: 'gril.png',             c: 'Гриль' },
      { img: 'barbekiu.png',         c: 'Барбекю' },
      { img: 'shveinaia.png',        c: 'Швейная машина' },
      { img: 'mebel.png',            c: 'Мебель' },
      { img: 'podarok.png',          c: 'Подарок' },
      { img: 'oki.png',              c: 'ОКи' }
    ];

    function prizeNode(p) {
      var el = document.createElement('div');
      el.className = 'rl-prize';
      el.innerHTML = '<img class="rl-prize__img" src="../assets/koleso/' +
                     p.img + '" alt="' + p.c + '">';
      return el;
    }

    var reel = document.getElementById('reel');
    // дублируем набор дважды — анимация уезжает ровно на один набор и зацикливается без шва
    [0, 1].forEach(function () {
      PRIZES.forEach(function (p) { reel.appendChild(prizeNode(p)); });
    });
    // высота цикла = высота одного набора (tile 220 + gap 8) × N
    var loop = PRIZES.length * (220 + 8);
    reel.style.setProperty('--rl-loop', '-' + loop + 'px');

    // ── Состояние билетов (?tickets=0 → реферальный режим) ────────
    var params = new URLSearchParams(location.search);
    var tickets = parseInt(params.get('tickets'), 10);
    if (isNaN(tickets)) tickets = 1;

    var coin = document.getElementById('coin-count');
    var ctaText = document.getElementById('cta-text');
    var cta = document.getElementById('cta');
    var wheel = document.getElementById('wheel');

    function render() {
      coin.textContent = tickets;
      if (tickets > 0) {
        ctaText.textContent = 'Крутить колесо за ' + tickets;
        cta.dataset.mode = 'spin';
      } else {
        ctaText.textContent = 'Пригласи друга и получи 1';
        cta.dataset.mode = 'invite';
      }
    }
    render();

    cta.addEventListener('click', function () {
      if (cta.dataset.mode === 'invite') {
        location.href = 'koleso-tasks.html';
        return;
      }
      // защита от повторного тапа во время прокрута
      if (wheel.classList.contains('__fast')) return;
      // списываем 1 билет за прокрут и сразу показываем новый счётчик
      tickets = Math.max(0, tickets - 1);
      coin.textContent = tickets;
      if (tickets > 0) ctaText.textContent = 'Крутить колесо за ' + tickets;
      // короткий разгон барабана; режим CTA (в т.ч. переход в invite при 0) — после остановки
      wheel.classList.add('__fast');
      setTimeout(function () {
        wheel.classList.remove('__fast');
        render();
      }, 2600);
    });

    // делегированная навигация по data-href (карточки/кнопки)
    document.addEventListener('click', function (e) {
      var el = e.target.closest && e.target.closest('[data-href]');
      if (!el || el.classList.contains('nav-bar__back')) return;
      e.preventDefault();
      location.href = el.getAttribute('data-href');
    });
  </script>
</body>
</html>
