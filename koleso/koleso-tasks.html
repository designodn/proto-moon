<!DOCTYPE html>
<html lang="ru" class="__ui-theme_enabled __ui-theme_light __font-roboto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Задания — прототип</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="../index.css">
<!-- В head синхронно: pagereveal — направление перехода. -->
<script src="../components/screen-transition.js"></script>
<style>
  * { -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; height:100%; background: var(--dynamic-surface-base-secondary); }
  .phone-frame { width:100%; max-width:none; height:100dvh; min-height:100dvh; overflow:hidden;
                 background: var(--dynamic-surface-base-secondary); }
  .phone-frame__feed { min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  .phone-frame__feed::-webkit-scrollbar { display:none; }
  .ll-icon { display:inline-block; flex-shrink:0; vertical-align:middle; }

  /* ── Контент ───────────────────────────────────────────────────── */
  .rt {
    display: flex; flex-direction: column; gap: var(--space-4);
    padding: var(--space-2) var(--space-4) 32px;
  }
  .rt__subtitle { color: var(--dynamic-text-and-icons-base-secondary); margin: 0 0 4px; }

  /* Карточка-задание */
  .rt-task {
    background: var(--dynamic-surface-base-primary);
    border-radius: 16px;
    padding: var(--space-4);
    display: flex; flex-direction: column; gap: var(--space-4);
  }
  .rt-task.__done { background: var(--static-surface-status-contrast-positive); }
  .rt-task__top { display: flex; align-items: center; gap: var(--space-3); }
  .rt-task__text { flex: 1 1 0; min-width: 0; }
  .rt-task__title { color: var(--dynamic-text-and-icons-base-primary); }
  .rt-task__reward { color: var(--dynamic-text-and-icons-base-secondary); margin-top: 2px; }
  .rt-task__icon {
    width: 56px; height: 56px; flex-shrink: 0;
    border-radius: 14px;
    background: var(--dynamic-surface-contrast-low);
    display: flex; align-items: center; justify-content: center;
    font-size: 34px; line-height: 1;
  }
  .rt-task__icon img { width: 48px; height: 48px; object-fit: contain; display: block; }
  /* кнопка-задания во всю ширину */
  .rt-task .button-wrapper { width: 100%; }
  .rt-task .button-container { width: 100%; }

  /* ── Шторка «Пригласи друга» ───────────────────────────────────── */
  .rt-sheet {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column; justify-content: flex-end;
    visibility: hidden;
  }
  .rt-sheet.__open { visibility: visible; }
  .rt-sheet__scrim {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.4);
    opacity: 0; transition: opacity 280ms ease;
  }
  .rt-sheet.__open .rt-sheet__scrim { opacity: 1; }
  .rt-sheet__panel {
    position: relative;
    background: var(--dynamic-surface-base-secondary);
    border-radius: 24px 24px 0 0;
    padding: 12px 16px 24px;
    transform: translateY(100%);
    transition: transform 360ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .rt-sheet.__open .rt-sheet__panel { transform: translateY(0); }
  .rt-sheet__handle { display:flex; justify-content:center; padding: 0 0 16px; }
  .rt-sheet__handle span { width: 36px; height: 4px; border-radius: 999px; background: var(--dynamic-surface-contrast-low); }
  .rt-sheet__emoji { font-size: 64px; line-height: 1; text-align: center; }
  .rt-sheet__emoji img { width: 96px; height: 96px; object-fit: contain; display: block; margin: 0 auto; }
  .rt-sheet__title { text-align: center; margin: 16px 0 8px; color: var(--dynamic-text-and-icons-base-primary); }
  .rt-sheet__text { text-align: center; color: var(--dynamic-text-and-icons-base-secondary); margin: 0 0 24px; padding: 0 8px; }
  .rt-sheet__btns { display: flex; flex-direction: column; gap: var(--space-3); }
  .rt-sheet__btns .button-wrapper,
  .rt-sheet__btns .button-container { width: 100%; }
</style>
</head>
<body>
  <div class="phone-frame __fullscreen" data-screen>
    <div class="phone-frame__feed">

      <!-- STATUS + NAVBAR — DS meshok-up -->
      <div class="meshok-up">
        <div class="status-bar">
          <span class="status-bar__time">9:41</span>
          <span class="status-bar__indicators">
            <img class="ll-icon" src="../assets/icons/status-wifi.svg"    width="16" height="12" alt="">
            <img class="ll-icon" src="../assets/icons/status-signal.svg"  width="17" height="12" alt="">
            <img class="ll-icon" src="../assets/icons/status-battery.svg" width="25" height="12" alt="">
          </span>
        </div>
        <div class="nav-bar __type-feed">
          <div class="nav-bar__leading">
            <span class="button-inline-wrapper __size-24 __view-secondary"><button class="button-inline __size-24 nav-bar__back" aria-label="Назад" data-href="koleso.html"><span class="button-inline__content"><span class="icon __size-24 __slot-back"></span></span></button></span>
            <span class="ds-title-l">Задания</span>
          </div>
        </div>
      </div>

      <!-- КОНТЕНТ -->
      <div class="rt">
        <p class="ds-body-m rt__subtitle">Выполняйте задания и получайте билетики</p>

        <!-- Пригласи друга -->
        <div class="rt-task">
          <div class="rt-task__top">
            <div class="rt-task__text">
              <div class="ds-title-s rt-task__title">Пригласите друзей в Колесо призов</div>
              <div class="ds-caption-m rt-task__reward">+1 билетик</div>
            </div>
            <div class="rt-task__icon"><img src="../assets/koleso/ruletka-lyudi.png" alt=""></div>
          </div>
          <div class="button-wrapper __size-44 __full-width">
            <button class="button-container __style-primary" data-href="koleso-friends.html"><span class="button-content">Пригласить</span></button>
          </div>
        </div>

        <!-- Подарите подарок -->
        <div class="rt-task">
          <div class="rt-task__top">
            <div class="rt-task__text">
              <div class="ds-title-s rt-task__title">Подарите подарок</div>
              <div class="ds-caption-m rt-task__reward">+1 билетик</div>
            </div>
            <div class="rt-task__icon"><img src="../assets/koleso/new/card-gift.png" alt=""></div>
          </div>
          <div class="button-wrapper __size-44 __full-width">
            <button class="button-container __style-primary"><span class="button-content">Выполнить</span></button>
          </div>
        </div>

        <!-- Установите фото профиля -->
        <div class="rt-task">
          <div class="rt-task__top">
            <div class="rt-task__text">
              <div class="ds-title-s rt-task__title">Установите фото профиля</div>
              <div class="ds-caption-m rt-task__reward">+1 билетик</div>
            </div>
            <div class="rt-task__icon"><img src="../assets/koleso/new/card-person.png" alt=""></div>
          </div>
          <div class="button-wrapper __size-44 __full-width">
            <button class="button-container __style-primary"><span class="button-content">Выполнить</span></button>
          </div>
        </div>

        <!-- Пополнение счета в ОК -->
        <div class="rt-task">
          <div class="rt-task__top">
            <div class="rt-task__text">
              <div class="ds-title-s rt-task__title">Пополнение счета в ОК</div>
              <div class="ds-caption-m rt-task__reward">+1 билетик</div>
            </div>
            <div class="rt-task__icon"><img src="../assets/koleso/new/card-ok.png" alt=""></div>
          </div>
          <div class="button-wrapper __size-44 __full-width">
            <button class="button-container __style-primary"><span class="button-content">Выполнить</span></button>
          </div>
        </div>

        <!-- Выполнено -->
        <div class="rt-task __done">
          <div class="rt-task__top">
            <div class="rt-task__text">
              <div class="ds-title-s rt-task__title">Посмотреть короткий ролик</div>
              <div class="ds-caption-m rt-task__reward">+1 билетик</div>
            </div>
            <div class="rt-task__icon"><img src="../assets/koleso/ruletka-kino.png" alt=""></div>
          </div>
          <div class="button-wrapper __size-44 __full-width">
            <button class="button-container __style-secondary __icon" disabled>
              <span class="button-content"><span class="icon __size-20"><img src="../assets/icons/checks_24.svg" width="20" height="20" alt=""></span>Выполнено</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Навигация по кнопкам с data-href (карточка «Пригласить» → люди).
    document.addEventListener('click', function (e) {
      var nav = e.target.closest('[data-href]');
      if (!nav || nav.classList.contains('nav-bar__back')) return;
      e.preventDefault();
      location.href = nav.getAttribute('data-href');
    });
  </script>
</body>
</html>
